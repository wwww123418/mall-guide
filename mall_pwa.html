<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1008">
  <meta name="apple-mobile-web-app-title" content="KK MALL">
  <meta name="application-name" content="KK MALL">
  <title>KK MALL</title>
  <link rel="manifest" href="manifest.json?v=1">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='%231a1008'/><text x='256' y='330' font-size='260' text-anchor='middle' fill='%23C5962A' font-weight='bold'>K</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      background:#1a1008;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    iframe{
      width:100%;height:100%;
      border:none;display:block;
      background:#fff;
    }

    /* ── 积分入口按钮 ── */
    #jifenBtn{
      position:fixed;top:env(safe-area-inset-top, 12px);
      right:14px;z-index:9000;
      background:#C5962A;color:#fff;
      border:none;border-radius:22px;
      padding:8px 14px;font-size:12px;font-weight:bold;
      cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.35);
      display:flex;align-items:center;gap:5px;
      transition:transform .15s,background .15s;
    }
    #jifenBtn:active{transform:scale(.95);background:#a87d22}

    /* ── 表单弹窗 ── */
    #jifenModal{
      display:none;position:fixed;inset:0;
      z-index:9999;
      background:rgba(0,0,0,.6);
      justify-content:center;align-items:flex-end;
    }
    #jifenModal.show{display:flex}
    #jifenSheet{
      background:#fff;border-radius:18px 18px 0 0;
      width:100%;max-width:480px;
      padding:28px 24px calc(24px + env(safe-area-inset-bottom, 0));
      animation:slideUp .28s ease;
      max-height:92vh;overflow-y:auto;
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

    .sheetHandle{
      width:40px;height:4px;border-radius:2px;
      background:#ddd;margin:0 auto 20px;
    }
    .sheetTitle{
      font-size:17px;font-weight:bold;color:#1a1008;
      margin-bottom:20px;text-align:center;
    }

    /* 步骤指示器 */
    .stepBar{
      display:flex;justify-content:center;gap:8px;margin-bottom:20px;
    }
    .stepDot{
      width:8px;height:8px;border-radius:50%;background:#e0d8c8;
      transition:background .3s;
    }
    .stepDot.active{background:#C5962A}

    /* Step1: 拍照区 */
    .camWrap{
      position:relative;border-radius:14px;overflow:hidden;
      background:#111;aspect-ratio:4/3;
      margin-bottom:14px;
    }
    .camWrap video,.camWrap img{
      width:100%;height:100%;object-fit:cover;
      display:block;
    }
    .camWrap img{position:absolute;inset:0;z-index:1;}
    .camOverlay{
      position:absolute;inset:0;display:flex;
      flex-direction:column;align-items:center;justify-content:center;
      color:#fff;text-align:center;z-index:2;pointer-events:none;
    }
    .camOverlay.hidden{display:none}
    .camOverlay .camIcon{font-size:52px;margin-bottom:8px;opacity:.8}
    .camOverlay p{font-size:13px;opacity:.7}

    /* 拍照按钮 */
    .camBtnRow{
      display:flex;gap:12px;margin-bottom:16px;
    }
    .camBtn{
      flex:1;padding:13px;border:none;border-radius:12px;
      font-size:15px;font-weight:bold;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:opacity .15s;
    }
    .camBtn:active{opacity:.8}
    .btnCapture{
      background:#C5962A;color:#fff;
    }
    .btnRetake{
      background:#f0ede6;color:#888;
    }

    /* Step2: 预览+表单 */
    .previewThumb{
      width:100%;border-radius:10px;border:2px dashed #e0d8c8;
      display:block;margin-bottom:16px;
    }
    .field{margin-bottom:16px}
    .field label{
      display:block;font-size:13px;color:#888;margin-bottom:6px;
    }
    .field input,.field select,.field textarea{
      width:100%;border:1.5px solid #e0d8c8;
      border-radius:10px;padding:11px 14px;font-size:15px;
      color:#1a1008;background:#faf8f4;
      outline:none;transition:border-color .2s;
    }
    .field input:focus,.field select:focus,.field textarea:focus{
      border-color:#C5962A;
    }
    .field textarea{resize:none;height:72px;}

    /* 步骤切换按钮文字 */
    .stepTitle{display:none}
    .stepTitle.active{display:block}

    .btnRow{display:flex;gap:12px;margin-top:20px}
    .btnCancel{
      flex:1;padding:13px;border:none;border-radius:12px;
      background:#f0ede6;color:#888;font-size:15px;cursor:pointer;
    }
    .btnNext{
      flex:2;padding:13px;border:none;border-radius:12px;
      background:#C5962A;color:#fff;font-size:15px;font-weight:bold;
      cursor:pointer;transition:background .15s;
    }
    .btnNext:active{background:#a87d22}
    .btnSubmit{
      flex:2;padding:13px;border:none;border-radius:12px;
      background:#C5962A;color:#fff;font-size:15px;font-weight:bold;
      cursor:pointer;transition:background .15s;
    }
    .btnSubmit:active{background:#a87d22}
    .btnSubmit:disabled{background:#ccc;cursor:not-allowed}

    /* 提交中状态 */
    .btnSubmit .spinner{
      display:inline-block;width:16px;height:16px;
      border:2px solid rgba(255,255,255,.4);
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;vertical-align:middle;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 提交成功 ── */
    #jifenSuccess{
      display:none;position:fixed;inset:0;z-index:10000;
      background:rgba(0,0,0,.55);
      justify-content:center;align-items:center;
    }
    #jifenSuccess.show{display:flex}
    #jifenSuccess .card{
      background:#fff;border-radius:16px;padding:36px 32px;
      text-align:center;max-width:280px;width:80%;
      animation:fadeIn .25s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    #jifenSuccess .icon{font-size:52px;margin-bottom:12px}
    #jifenSuccess h3{font-size:17px;color:#1a1008;margin-bottom:8px}
    #jifenSuccess p{font-size:13px;color:#888;line-height:1.6}
    #jifenSuccess button{
      margin-top:20px;background:#C5962A;color:#fff;
      border:none;border-radius:10px;padding:11px 32px;
      font-size:15px;font-weight:bold;cursor:pointer;
    }

    /* ── PWA install banner ── */
    #installBanner{
      display:none;position:fixed;bottom:0;left:0;right:0;
      background:#C5962A;color:#fff;
      padding:14px 20px;
      font-size:14px;
      z-index:9999;
      box-shadow:0 -2px 12px rgba(0,0,0,0.3);
      justify-content:space-between;align-items:center;
      gap:12px;
    }
    #installBanner.show{display:flex}
    #installBanner span{flex:1}
    #installBanner button{
      background:#fff;color:#1a1008;border:none;
      padding:7px 16px;border-radius:20px;
      font-size:13px;font-weight:bold;cursor:pointer;
      white-space:nowrap;
    }
    #installBanner .closeBtn{
      background:transparent;color:rgba(255,255,255,0.7);
      padding:4px 8px;font-size:18px;
    }
  </style>
</head>
<body>
  <iframe
    id="mainFrame"
    src="mall_guide.html"
    allow="geolocation;camera"
    loading="lazy"
  ></iframe>

  <!-- 积分入口按钮 -->
  <button id="jifenBtn" onclick="openJifen()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    自助积分
  </button>

  <!-- 积分提交表单 -->
  <div id="jifenModal">
    <div id="jifenSheet">

      <div class="sheetHandle"></div>

      <!-- 步骤指示器 -->
      <div class="stepBar">
        <div class="stepDot active" id="dot1"></div>
        <div class="stepDot" id="dot2"></div>
      </div>

      <!-- ========== STEP 1: 拍照 ========== -->
      <div id="step1">
        <div class="sheetTitle">📷 拍摄小票</div>

        <div class="camWrap" id="camWrap">
          <!-- 摄像头画面 -->
          <video id="camVideo" autoplay playsinline muted></video>
          <!-- 拍照后预览 -->
          <img id="camPreview" src="" alt="小票预览" style="display:none">
          <!-- 提示文字 -->
          <div class="camOverlay" id="camOverlay">
            <div class="camIcon">📷</div>
            <p>点击下方按钮开启摄像头<br>对准小票拍照</p>
          </div>
        </div>

        <div class="camBtnRow">
          <!-- 主按钮：打开相机（iOS/Android/iPad 通用，capture 属性直接写在 HTML 中） -->
          <button class="camBtn btnCapture" id="btnCapture" onclick="document.getElementById('fileInput').click()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3"/><path d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/></svg>
            拍照上传
          </button>
          <!-- 备选：从相册选择 -->
          <button class="camBtn btnRetake" id="btnAlbum" onclick="openAlbum()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            相册选择
          </button>
          <!-- 重拍（拍完后才显示） -->
          <button class="camBtn btnRetake" id="btnRetake" onclick="retakePhoto()" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.54"/></svg>
            重拍
          </button>
        </div>

        <div class="btnRow">
          <button class="btnCancel" onclick="closeJifen()">取消</button>
          <button class="btnNext" id="btnNextStep" onclick="goStep2()" disabled>下一步 →</button>
        </div>
      </div>

      <!-- ========== STEP 2: 手机号 ========== -->
      <div id="step2" style="display:none">
        <div class="sheetTitle">📱 填写手机号</div>

        <img id="thumbPreview" class="previewThumb" src="" alt="小票预览">

        <div class="field">
          <label>手机号码</label>
          <input id="jfPhone" type="tel" maxlength="11" placeholder="请输入手机号" inputmode="numeric">
        </div>

        <div class="field">
          <label>备注（选填）</label>
          <textarea id="jfNote" placeholder="积分说明等"></textarea>
        </div>

        <div class="btnRow">
          <button class="btnCancel" onclick="backStep1()">← 上一步</button>
          <button class="btnSubmit" id="btnSubmit" onclick="submitJifen()">提交积分</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 隐藏的文件input，capture 直接写在 HTML 中，iOS 必须硬编码 -->
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
  <!-- 备选：相册选择（无 capture 属性，弹出选择器） -->
  <input type="file" id="albumInput" accept="image/*" style="display:none">

  <!-- 提交成功 -->
  <div id="jifenSuccess">
    <div class="card">
      <div class="icon">✅</div>
      <h3>提交成功</h3>
      <p>积分信息已收到，审核通过后自动到账<br>如有疑问请联系客服</p>
      <button onclick="document.getElementById('jifenSuccess').classList.remove('show')">我知道了</button>
    </div>
  </div>

  <div id="installBanner">
    <span>👉 收藏到主屏幕，更快访问</span>
    <button onclick="installApp()">立即添加</button>
    <button class="closeBtn" onclick="closeBanner()">×</button>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=1').catch(() => {});
    }

    // ── 状态 ──
    let capturedImageData = null;
    let currentStep = 1;

    // ── 表单基础 ──
    function openJifen() {
      document.getElementById('jifenModal').classList.add('show');
      document.getElementById('mainFrame').style.pointerEvents = 'none';
      goStep(1);
    }

    function closeJifen() {
      document.getElementById('jifenModal').classList.remove('show');
      document.getElementById('mainFrame').style.pointerEvents = '';
      capturedImageData = null;
    }

    // ── 步骤切换 ──
    function goStep(n) {
      currentStep = n;
      document.getElementById('step1').style.display = n === 1 ? '' : 'none';
      document.getElementById('step2').style.display = n === 2 ? '' : 'none';
      document.getElementById('dot1').classList.toggle('active', n === 1);
      document.getElementById('dot2').classList.toggle('active', n === 2);

      if (n === 1) {
        // 重置 Step1 视图
        document.getElementById('camPreview').style.display = 'none';
        document.getElementById('camPreview').src = '';
        document.getElementById('camVideo').style.display = 'none';
        document.getElementById('camOverlay').classList.remove('hidden');
        document.getElementById('btnCapture').style.display = 'flex';
        document.getElementById('btnAlbum').style.display = 'flex';
        document.getElementById('btnRetake').style.display = 'none';
        document.getElementById('btnNextStep').disabled = true;
      }

      if (n === 2 && capturedImageData) {
        document.getElementById('thumbPreview').src = capturedImageData;
        document.getElementById('jfPhone').focus();
      }
    }
    function goStep2() { goStep(2); }
    function backStep1() { goStep(1); }

    // ── 拍照入口 ──
    // 拍照按钮 → fileInput（capture=environment → 优先开相机）
    // 相册按钮 → albumInput（无 capture → 弹出选择器）
    function openAlbum() {
      document.getElementById('albumInput').click();
    }

    function retakePhoto() {
      // 重拍：开相机（也保留相册入口）
      document.getElementById('btnAlbum').style.display = 'flex';
      document.getElementById('btnRetake').style.display = 'none';
      document.getElementById('fileInput').click();
    }

    // 处理文件选择（相机 + 相册 共用逻辑）
    async function handleFilePick(file) {
      if (!file) return;

      const preview = document.getElementById('camPreview');
      const btnCapture = document.getElementById('btnCapture');
      const btnAlbum   = document.getElementById('btnAlbum');
      const btnRetake  = document.getElementById('btnRetake');

      // 显示加载中
      preview.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><rect fill="%23eee" width="100" height="60"/><text x="50" y="35" text-anchor="middle" font-size="10" fill="%23aaa">处理中…</text></svg>';
      preview.style.display = 'block';
      document.getElementById('camVideo').style.display = 'none';
      document.getElementById('camOverlay').classList.add('hidden');

      // 读取并压缩
      capturedImageData = await loadAndCompress(file);

      // 显示预览，按钮切换为「重拍」
      preview.src = capturedImageData;
      btnCapture.style.display = 'none';
      btnAlbum.style.display   = 'none';
      btnRetake.style.display  = 'flex';
      document.getElementById('btnNextStep').disabled = false;
    }

    document.getElementById('fileInput').addEventListener('change', e => {
      handleFilePick(e.target.files[0]);
      e.target.value = '';
    });
    document.getElementById('albumInput').addEventListener('change', e => {
      handleFilePick(e.target.files[0]);
      e.target.value = '';
    });

    // 读取图片 → 压缩到 maxW，输出 JPEG base64
    function loadAndCompress(file, maxW = 1200, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = ev => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            const scale = Math.min(1, maxW / Math.max(img.width, img.height));
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);
            const c = Object.assign(document.createElement('canvas'), { width: w, height: h });
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', quality));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function retakePhoto() {
      capturedImageData = null;
      document.getElementById('camPreview').style.display = 'none';
      document.getElementById('camPreview').src = '';
      document.getElementById('camVideo').style.display = 'none';
      document.getElementById('camOverlay').classList.remove('hidden');
      document.getElementById('btnCapture').style.display = 'flex';
      document.getElementById('btnRetake').style.display = 'none';
      document.getElementById('btnNextStep').disabled = true;
    }

    // 备用：文件上传（摄像头不可用时）
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        capturedImageData = ev.target.result;
        document.getElementById('camPreview').src = capturedImageData;
        document.getElementById('camPreview').style.display = 'block';
        document.getElementById('camVideo').style.display = 'none';
        document.getElementById('camOverlay').classList.add('hidden');
        document.getElementById('btnCapture').style.display = 'none';
        document.getElementById('btnRetake').style.display = 'flex';
        document.getElementById('btnNextStep').disabled = false;
      };
      reader.readAsDataURL(file);
    });

    // ── 提交 ──
    async function submitJifen() {
      const phone = document.getElementById('jfPhone').value.trim();
      const note = document.getElementById('jfNote').value.trim();

      if (!/^1\d{10}$/.test(phone)) {
        alert('请输入正确的11位手机号');
        return;
      }
      if (!capturedImageData) {
        alert('请先拍摄小票');
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 提交中…';

      const now = new Date();
      const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

      const payload = {
        phone,
        note,
        image: capturedImageData,
        time: timeStr,
        mall: 'KK MALL'
      };

      // TODO: 替换为真实推送（企业微信群机器人/QQ机器人）
      console.log('积分提交 payload:', {
        phone,
        note,
        imageLen: capturedImageData ? capturedImageData.length : 0,
        time: timeStr
      });

      // 模拟网络延迟
      await new Promise(r => setTimeout(r, 800));

      closeJifen();
      document.getElementById('jifenSuccess').classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '提交积分';
      document.getElementById('jfPhone').value = '';
      document.getElementById('jfNote').value = '';
      capturedImageData = null;
    }

    // 点击遮罩关闭
    document.getElementById('jifenModal').addEventListener('click', e => {
      if (e.target === document.getElementById('jifenModal')) closeJifen();
    });

    // ── PWA 安装提示 ──
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => {
        if (!localStorage.getItem('pwaBannerClosed')) {
          document.getElementById('installBanner').classList.add('show');
        }
      }, 3000);
    });
    function installApp() {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
      else { alert('请使用浏览器菜单中的"添加到主屏幕"功能'); }
    }
    function closeBanner() {
      document.getElementById('installBanner').classList.remove('show');
      localStorage.setItem('pwaBannerClosed', '1');
    }
  </script>
</body>
</html>
