<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1008">
  <meta name="apple-mobile-web-app-title" content="KK MALL">
  <meta name="application-name" content="KK MALL">
  <title>KK MALL</title>
  <link rel="manifest" href="manifest.json?v=1">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='%231a1008'/><text x='256' y='330' font-size='260' text-anchor='middle' fill='%23C5962A' font-weight='bold'>K</text></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      background:#1a1008;
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    iframe{
      width:100%;height:100%;
      border:none;display:block;
      background:#fff;
    }
    /* PWA install banner */
    #installBanner{
      display:none;position:fixed;bottom:0;left:0;right:0;
      background:#C5962A;color:#fff;
      padding:14px 20px;
      font-size:14px;
      z-index:9999;
      box-shadow:0 -2px 12px rgba(0,0,0,0.3);
      justify-content:space-between;align-items:center;
      gap:12px;
    }
    #installBanner.show{display:flex}
    #installBanner span{flex:1}
    #installBanner button{
      background:#fff;color:#1a1008;border:none;
      padding:7px 16px;border-radius:20px;
      font-size:13px;font-weight:bold;cursor:pointer;
      white-space:nowrap;
    }
    #installBanner .closeBtn{
      background:transparent;color:rgba(255,255,255,0.7);
      padding:4px 8px;font-size:18px;
    }
  </style>
</head>
<body>
  <iframe
    id="mainFrame"
    src="mall_guide.html"
    allow="geolocation;camera"
    loading="lazy"
  ></iframe>

  <div id="installBanner">
    <span>👉 收藏到主屏幕，更快访问</span>
    <button onclick="installApp()">立即添加</button>
    <button class="closeBtn" onclick="closeBanner()">×</button>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=1').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(e => console.log('SW error:', e));
    }

    // Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => {
        if (!localStorage.getItem('pwaBannerClosed')) {
          document.getElementById('installBanner').classList.add('show');
        }
      }, 3000);
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          closeBanner();
          deferredPrompt = null;
        });
      } else {
        alert('请使用浏览器菜单中的"添加到主屏幕"功能');
      }
    }

    function closeBanner() {
      document.getElementById('installBanner').classList.remove('show');
      localStorage.setItem('pwaBannerClosed', '1');
    }
  </script>
</body>
</html>
