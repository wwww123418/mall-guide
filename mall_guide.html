<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- v2026-04-23d: PWA + jifen card -->
<title>KK MALL 瀵艰喘</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KK MALL">
<meta name="theme-color" content="#0c0c14">
<link rel="apple-touch-icon" href="https://wwww123418.github.io/mall-guide/icon-192.png">
<link rel="manifest" href="https://wwww123418.github.io/mall-guide/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0c0c14;
    --bg-card:     #15151f;
    --bg-card-hover: #1c1c2a;
    --bg-header:   #10101a;
    --border:      rgba(201,169,110,0.15);
    --border-hover:rgba(201,169,110,0.4);
    --gold:        #c9a96e;
    --gold-light:  #e8c98a;
    --gold-dim:    rgba(201,169,110,0.12);
    --gold-glow:   rgba(201,169,110,0.08);
    --text:        #eee8df;
    --text-secondary: #8a8a9e;
    --text-dim:    #55556a;
    --white:       #ffffff;
    --shadow:      0 4px 24px rgba(0,0,0,0.5);
    --shadow-gold: 0 4px 30px rgba(201,169,110,0.15);
    --radius:      14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* 鈹€鈹€ Header 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .header {
    background: var(--bg-header);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 0;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), #b8904e);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(201,169,110,0.3);
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: #e91e63;
    letter-spacing: 2px;
  }

  .header-subtitle {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-deco {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-deco span {
    display: block;
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .header-deco em {
    font-style: normal;
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 2px;
  }

  .floor-tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-top: 16px;
  }

  .floor-tabs::-webkit-scrollbar { display: none; }

  .floor-tab {
    flex-shrink: 0;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    transition: all 0.25s;
    position: relative;
    white-space: nowrap;
  }

  .floor-tab:hover {
    color: var(--gold-light);
    background: var(--gold-glow);
  }

  .floor-tab.active {
    color: var(--gold);
    background: var(--gold-dim);
    border-color: var(--border);
    border-bottom-color: var(--bg-header);
    font-weight: 700;
  }

  .floor-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  /* 鈹€鈹€ Service Bar 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .service-bar {
    background: linear-gradient(135deg, #1a1520, #1c1830);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
  }

  .service-bar-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .service-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .service-info svg { color: var(--gold); flex-shrink: 0; }

  .service-phone {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    text-decoration: none;
    letter-spacing: 1px;
    font-family: "Courier New", Courier, monospace;
    transition: color 0.2s;
  }

  .service-phone:hover { color: #fff; }

  .vip-hotline {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .vip-hotline strong {
    color: var(--gold);
    font-weight: 600;
  }

  /* 鈹€鈹€ Search 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .search-wrap {
    padding: 16px;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
  }

  .search-box {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 10px 20px;
    gap: 10px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-box:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow), var(--shadow-gold);
  }

  .search-box svg { flex-shrink: 0; color: var(--gold); opacity: 0.7; }

  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    outline: none;
    color: var(--text);
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .clear-btn {
    background: none;
    border: none;
    font-size: 16px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    display: none;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--text-secondary); }
  .clear-btn.visible { display: block; }

  /* 鈹€鈹€ Category Filter 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .cat-filter {
    padding: 10px 16px 8px;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
  }

  .cat-chips {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .cat-chips::-webkit-scrollbar { display: none; }

  .cat-chip {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.22s;
    white-space: nowrap;
    font-weight: 500;
  }

  .cat-chip:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: var(--gold-dim);
  }

  .cat-chip.active {
    background: linear-gradient(135deg, var(--gold), #b8904e);
    border-color: var(--gold);
    color: #0c0c14;
    font-weight: 700;
    box-shadow: 0 2px 12px rgba(201,169,110,0.3);
  }

  /* 鈹€鈹€ Content 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  .floor-section { display: none; }
  .floor-section.active { display: block; }

  /* 鈹€鈹€ Stats Bar 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .stats-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-around;
    gap: 16px;
    box-shadow: var(--shadow);
  }

  .stat-item { text-align: center; position: relative; }
  .stat-item + .stat-item::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 28px;
    background: var(--border);
  }
  .stat-num {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

  /* 鈹€鈹€ VIP Section 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .vip-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .vip-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .vip-header-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--gold), #b8904e);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(201,169,110,0.3);
  }

  .vip-header-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .vip-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .vip-header-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .vip-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .vip-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .vip-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .vip-card.v-card::before { background: linear-gradient(to right, #5a5a6a, #7a7a8a); }
  .vip-card.s-card::before { background: linear-gradient(to right, #a08050, #c9a96e); }
  .vip-card.g-card::before { background: linear-gradient(to right, #c9a030, #e8c84a); }
  .vip-card.d-card::before { background: linear-gradient(to right, #a0b8d0, #c8e0f8); }

  .vip-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-gold);
  }

  .vip-card:hover.v-card { border-color: rgba(90,90,106,0.4); }
  .vip-card:hover.s-card { border-color: rgba(201,169,110,0.4); }
  .vip-card:hover.g-card { border-color: rgba(201,169,110,0.5); }
  .vip-card:hover.d-card { border-color: rgba(160,184,208,0.5); }

  .vip-tier {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .v-card .vip-tier { color: #aaa8b8; }
  .s-card .vip-tier { color: var(--gold); }
  .g-card .vip-tier { color: #e8c84a; }
  .d-card .vip-tier { color: #b8d4f0; }

  .vip-divider {
    width: 24px; height: 1px;
    margin: 0 auto 10px;
  }

  .v-card .vip-divider { background: #3a3a4a; }
  .s-card .vip-divider { background: rgba(201,169,110,0.3); }
  .g-card .vip-divider { background: rgba(232,200,74,0.3); }
  .d-card .vip-divider { background: rgba(184,212,240,0.3); }

  .vip-benefit {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.7;
    text-align: left;
  }

  .vip-benefit li {
    list-style: none;
    padding-left: 10px;
    position: relative;
    margin-bottom: 3px;
  }

  .v-card .vip-benefit li::before { content: '路'; position: absolute; left: 0; color: #5a5a6a; }
  .s-card .vip-benefit li::before { content: '路'; position: absolute; left: 0; color: var(--gold); opacity: 0.6; }
  .g-card .vip-benefit li::before { content: '路'; position: absolute; left: 0; color: #e8c84a; opacity: 0.6; }
  .d-card .vip-benefit li::before { content: '鈽?; position: absolute; left: 0; color: #b8d4f0; font-size: 8px; top: 3px; }

  /* 鈹€鈹€ VIP Upgrade/Renewal Conditions 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .vip-cond {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.06);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
  }
  .vip-cond-row {
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .vip-cond-row span:first-child {
    flex-shrink: 0;
    color: var(--text-secondary);
  }
  .vip-cond-row span:last-child {
    text-align: right;
  }
  .vip-tag-forever {
    color: var(--gold);
    font-weight: 600;
  }

  /* 鈹€鈹€ Category Group 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .cat-group { margin-bottom: 28px; }

  .cat-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-title::before {
    content: '';
    width: 20px;
    height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
  }

  .cat-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 鈹€鈹€ Brand Grid 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
  }

  .brand-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .brand-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--gold), var(--gold-light), var(--gold));
    opacity: 0;
    transition: opacity 0.28s;
  }

  .brand-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, var(--gold-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.28s;
  }

  .brand-card:hover {
    transform: translateY(-3px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-gold);
    background: var(--bg-card-hover);
  }

  .brand-card:hover::before { opacity: 1; }
  .brand-card:hover::after { opacity: 1; }

  .brand-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.35;
    position: relative;
    z-index: 1;
  }

  .brand-code {
    font-size: 10px;
    color: var(--text-dim);
    font-family: "Courier New", Courier, monospace;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }

  .brand-location {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gold-dim);
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 6px;
    border: 1px solid rgba(201,169,110,0.2);
    position: relative;
    z-index: 1;
    transition: all 0.22s;
  }

  .brand-card:hover .brand-location {
    background: rgba(201,169,110,0.2);
    border-color: rgba(201,169,110,0.4);
  }

  /* Highlighted card */
  .brand-card.highlight {
    border-color: rgba(201,169,110,0.3);
    background: var(--bg-card-hover);
  }

  /* Renovating badge */
  .badge-reno {
    display: inline-block;
    font-size: 10px;
    background: rgba(255,100,100,0.12);
    color: #e07070;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 4px;
    font-weight: 600;
    vertical-align: middle;
  }

  /* 鈹€鈹€ Empty State 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
  }

  .empty-state .icon { font-size: 52px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }

function initFloorTabs() {
  const container = document.getElementById('floorTabs');
  container.innerHTML = '';
  Object.keys(DATA).forEach(floor => {
    const tab = document.createElement('div');
    tab.className = 'floor-tab' + (floor === currentFloor ? ' active' : '');
    tab.textContent = DATA[floor].floorName;
    tab.onclick = () => switchFloor(floor);
    container.appendChild(tab);
  });
}

function initCatChips() {
  const container = document.getElementById('catChips');
  const allCats = new Set();
  Object.values(DATA).forEach(f => Object.keys(f.categories).forEach(c => allCats.add(c)));
  const cats = ['鍏ㄩ儴', ...Array.from(allCats)];
  container.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (cat === currentCat ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => switchCat(cat);
    container.appendChild(chip);
  });
}

function switchFloor(floor) {
  currentFloor = floor;
  currentCat = '鍏ㄩ儴';
  document.querySelectorAll('.floor-tab').forEach((t, i) => t.classList.toggle('active', Object.keys(DATA)[i] === floor));
  document.querySelectorAll('.cat-chip').forEach((c, i) => c.classList.toggle('active', i === 0));
  render();
}

function switchCat(cat) {
  currentCat = cat;
  const chips = document.querySelectorAll('.cat-chip');
  const catIndex = cat === '鍏ㄩ儴' ? 0 : Array.from(chips).findIndex(c => c.textContent === cat);
  chips.forEach((c, i) => c.classList.toggle('active', i === catIndex));
  render();
}

  searchQuery = '';

  const today = new Date().toISOString().slice(0,10);
  const activeSlides = slides.filter(function(s) {
    if (typeof s === 'string') return true;
    return s.expires > today;
  }).map(function(s) {
    return typeof s === 'string' ? s : s.src;
  });
  if (activeSlides.length === 0) return; // 鏃犳椿鍔ㄥ浘鍒欎笉娓叉煋杞挱
  // 鐢?activeSlides 鏇夸唬 slides
  const total = activeSlides.length;
  let idx = 0;
  let timer = null;
  let idleTimer = null; // 绌洪棽璁℃椂鍣細鐢ㄦ埛鏃犳搷浣?0绉掑悗寮圭獥
  const INTERVAL = 4000;
  const IDLE_DELAY = 10000; // 10绉掓棤鎿嶄綔鍚庡脊鍑?

  // Build DOM
  const overlay = document.createElement('div');
  overlay.className = 'carousel-overlay';
  overlay.id = 'carouselOverlay';

  let dotsHTML = '';
  for (let i = 0; i < total; i++) {
    dotsHTML += '<div class="carousel-dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '"></div>';
  }

  overlay.innerHTML =
    '<button class="carousel-close" id="carouselClose">鉁?/button>' +
    '<div class="carousel-track-wrap">' +
      '<div class="carousel-track" id="carouselTrack">' +
        activeSlides.map(function(s) { return '<div class="carousel-slide"><img src="' + s + '" draggable="false"></div>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="carousel-dots" id="carouselDots">' + dotsHTML + '</div>';

  document.body.appendChild(overlay);

  var track = document.getElementById('carouselTrack');
  var dots = document.getElementById('carouselDots').children;
  var closeBtn = document.getElementById('carouselClose');

  function goTo(i) {
    if (i < 0) i = total - 1;
    if (i >= total) i = 0;
    idx = i;
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    for (var d = 0; d < dots.length; d++) {
      dots[d].classList.toggle('active', d === idx);
    }
  }

  function startAuto() {
    stopAuto();
    timer = setInterval(function() { goTo(idx + 1); }, INTERVAL);
  }

  function stopAuto() {
    if (timer) { clearInterval(timer); timer = null; }
  }

  function startIdleTimer() {
    clearIdleTimer();
    idleTimer = setTimeout(function() {
      showCarousel();
      goTo(0);
      goHome();
      startAuto();
    }, IDLE_DELAY);
  }

  function clearIdleTimer() {
    if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  }

  // 鐢ㄦ埛娲诲姩妫€娴嬶細閲嶇疆绌洪棽璁℃椂鍣?
  function onUserActivity() {
    // 鍙湁寮圭獥闅愯棌鏃舵墠閲嶇疆璁℃椂鍣?
    if (overlay.classList.contains('hidden')) {
      clearIdleTimer();
      startIdleTimer();
    }
  }

  function showCarousel() {
    overlay.classList.remove('hidden');
  }

  function hideCarousel() {
    overlay.classList.add('hidden');
    stopAuto();
    startIdleTimer(); // 寮€濮嬬┖闂茶鏃跺櫒锛?0绉掓棤鎿嶄綔鍚庡脊绐?
  }

  function goHome() {
    currentFloor = 'B1';
    currentCat = '鍏ㄩ儴';
    searchQuery = '';
    var si = document.getElementById('searchInput');
    if (si) si.value = '';
    var cb = document.getElementById('clearBtn');
    if (cb) cb.classList.remove('visible');
    initFloorTabs();
    initCatChips();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Close button
  closeBtn.addEventListener('click', function() {
    hideCarousel();
  });

  // Dot clicks
  for (var d = 0; d < dots.length; d++) {
    dots[d].addEventListener('click', (function(i) {
      return function() { stopAuto(); goTo(i); };
    })(d));
  }

  // Touch / swipe 鈥?only pause on real horizontal swipe (>10px)
  var startX = 0, startY = 0, swiping = false, dx = 0;
  var touchMoved = false;

  track.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = false;
    dx = 0;
    touchMoved = false;
    track.classList.add('no-transition');
  }, { passive: true });

  track.addEventListener('touchmove', function(e) {
    touchMoved = true;
    var cx = e.touches[0].clientX;
    dx = cx - startX;
    var cy = e.touches[0].clientY;
    if (Math.abs(cy - startY) > Math.abs(dx)) return;
    if (Math.abs(dx) > 10 && !swiping) {
      swiping = true;
      stopAuto();
    }
    if (swiping) {
      track.style.transform = 'translateX(' + (-idx * 100 + dx / track.parentElement.offsetWidth * 100) + '%)';
    }
  }, { passive: true });

  track.addEventListener('touchend', function() {
    track.classList.remove('no-transition');
    if (swiping) {
      if (Math.abs(dx) > 50) {
        goTo(dx < 0 ? idx + 1 : idx - 1);
      } else {
        goTo(idx);
      }
    }
    swiping = false;
  });

  // Mouse drag (desktop)
  var mDown = false, mStartX = 0, mDx = 0;
  track.addEventListener('mousedown', function(e) {
    mDown = true;
    mStartX = e.clientX;
    mDx = 0;
    track.classList.add('no-transition');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!mDown) return;
    mDx = e.clientX - mStartX;
    if (Math.abs(mDx) > 10) {
      stopAuto();
    }
    track.style.transform = 'translateX(' + (-idx * 100 + mDx / track.parentElement.offsetWidth * 100) + '%)';
  });
  document.addEventListener('mouseup', function() {
    if (!mDown) return;
    mDown = false;
    track.classList.remove('no-transition');
    if (Math.abs(mDx) > 50) {
      goTo(mDx < 0 ? idx + 1 : idx - 1);
    } else {
      goTo(idx);
    }
  });

  // 鐩戝惉鐢ㄦ埛娲诲姩锛氭粦鍔ㄣ€佺偣鍑汇€佹粴鍔ㄧ瓑鎿嶄綔閲嶇疆绌洪棽璁℃椂鍣?
  document.addEventListener('touchstart', onUserActivity, { passive: true });
  document.addEventListener('click', onUserActivity);
  document.addEventListener('scroll', onUserActivity, { passive: true });
  document.addEventListener('keydown', onUserActivity);

  // Auto show on load
  showCarousel();
  startAuto();
})();

  function jfLoadCompress(file, maxW = 1200, quality = 0.75) {

      reader.onerror = reject;
      reader.onload = ev => {
        const img = new Image(); img.onerror = reject;
        img.onload = () => {
          const scale = Math.min(1, maxW / Math.max(img.width, img.height));
          const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
          const c = Object.assign(document.createElement('canvas'), { width: w, height: h });
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

        c.getContext('2d').drawImage(img, 0, 0, w, h);
