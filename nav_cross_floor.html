<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK MALL 跨楼层导航 Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #0a0a0a; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; }

  /* === Header === */
  .header { background: #1a1207; border-bottom: 1px solid rgba(212,175,55,0.2); padding: 0 20px; display: flex; align-items: center; gap: 20px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #d4af37, #a8862a); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .logo-text { font-size: 15px; font-weight: 700; color: #d4af37; letter-spacing: 2px; }
  .floor-pills { display: flex; gap: 6px; }
  .floor-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.2); color: rgba(212,175,55,0.6); font-size: 13px; cursor: pointer; transition: all 0.2s; background: transparent; }
  .floor-pill:hover { border-color: rgba(212,175,55,0.5); color: #d4af37; }
  .floor-pill.active { background: rgba(212,175,55,0.15); border-color: #d4af37; color: #d4af37; }

  /* === Layout === */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* === Left: 品牌列表 === */
  .panel-left { width: 220px; border-right: 1px solid rgba(212,175,55,0.1); display: flex; flex-direction: column; overflow: hidden; }
  .panel-left-header { padding: 12px 16px; background: #110e06; border-bottom: 1px solid rgba(212,175,55,0.1); font-size: 11px; color: rgba(212,175,55,0.5); letter-spacing: 1px; }
  .panel-left-search { padding: 8px 12px; border-bottom: 1px solid rgba(212,175,55,0.1); }
  .panel-left-search input { width: 100%; padding: 8px 10px; background: #1a1510; border: 1px solid rgba(212,175,55,0.15); border-radius: 8px; color: #e8e8e8; font-size: 13px; outline: none; }
  .panel-left-search input:focus { border-color: rgba(212,175,55,0.4); }
  .brand-list { flex: 1; overflow-y: auto; padding: 8px; }
  .brand-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; margin-bottom: 4px; }
  .brand-item:hover { background: rgba(212,175,55,0.08); }
  .brand-item.selected { background: rgba(212,175,55,0.12); border-color: rgba(212,175,55,0.3); }
  .brand-item-name { font-size: 13px; font-weight: 600; color: #e8e8e8; }
  .brand-item-floor { font-size: 11px; color: #d4af37; margin-top: 2px; }
  .brand-item-loc { font-size: 10px; color: rgba(232,232,232,0.4); margin-top: 1px; }

  /* === Center: 地图画布 === */
  .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: #0d0b06; }
  .floor-img-wrap { position: relative; display: inline-block; }
  .floor-img { display: block; max-width: 100%; max-height: calc(100vh - 120px); border: 1px solid rgba(212,175,55,0.1); border-radius: 8px; }
  .floor-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }

  /* === 右下角：图例 === */
  .legend { position: absolute; bottom: 16px; right: 16px; background: rgba(17,14,6,0.9); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; padding: 10px 14px; font-size: 11px; color: rgba(232,232,232,0.6); }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-dot-brand { background: #ff4757; }
  .legend-dot-elevator { background: #d4af37; }
  .legend-dot-entrance { background: #2ed573; }
  .legend-dot-route { background: #70a1ff; }
  .legend-line { width: 20px; height: 2px; background: #70a1ff; border-radius: 1px; }

  /* === Right: 导航面板 === */
  .panel-right { width: 280px; border-left: 1px solid rgba(212,175,55,0.1); display: flex; flex-direction: column; overflow: hidden; }
  .nav-panel { flex: 1; overflow-y: auto; padding: 16px; }
  .nav-title { font-size: 12px; color: rgba(212,175,55,0.5); letter-spacing: 1px; margin-bottom: 12px; }
  .nav-brand-name { font-size: 20px; font-weight: 700; color: #d4af37; margin-bottom: 4px; }
  .nav-brand-loc { font-size: 13px; color: rgba(232,232,232,0.6); margin-bottom: 16px; }

  /* 导航步骤卡片 */
  .nav-step { background: #1a1510; border: 1px solid rgba(212,175,55,0.15); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .nav-step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.4); color: #d4af37; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-num.current { background: #d4af37; color: #0a0a0a; font-weight: 700; }
  .step-floor { font-size: 13px; font-weight: 600; color: #e8e8e8; }
  .step-desc { font-size: 12px; color: rgba(232,232,232,0.6); line-height: 1.6; padding-left: 34px; }
  .step-highlight { color: #d4af37; font-weight: 600; }
  .step-tip { margin-top: 8px; padding: 8px 10px; background: rgba(212,175,55,0.06); border-radius: 6px; font-size: 11px; color: rgba(212,175,55,0.7); display: flex; align-items: center; gap: 6px; }

  /* 起点/终点 */
  .route-poi { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(212,175,55,0.05); border-radius: 8px; margin-bottom: 6px; font-size: 12px; }
  .poi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .poi-start { background: #2ed573; }
  .poi-end { background: #ff4757; }

  .nav-empty { text-align: center; padding: 40px 20px; color: rgba(232,232,232,0.3); font-size: 13px; }
  .nav-empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* === SVG markers === */
  .marker-brand { animation: pulse-red 2s infinite; }
  @keyframes pulse-red {
    0%, 100% { r: 8; opacity: 1; }
    50% { r: 12; opacity: 0.6; }
  }
  .marker-entrance { }
  .marker-elevator { }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ========== Header ========== -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🏬</div>
    <div class="logo-text">KK MALL</div>
  </div>
  <div class="floor-pills" id="floor-pills"></div>
</div>

<!-- ========== Main ========== -->
<div class="main">

  <!-- 左：品牌列表 -->
  <div class="panel-left">
    <div class="panel-left-header">全部品牌</div>
    <div class="panel-left-search">
      <input id="search" type="text" placeholder="搜索品牌..." />
    </div>
    <div class="brand-list" id="brand-list"></div>
  </div>

  <!-- 中：地图 -->
  <div class="canvas-wrap">
    <div class="floor-img-wrap" id="floor-img-wrap">
      <img class="floor-img" id="floor-img" src="" alt="楼层平面图" />
      <svg class="floor-svg" id="floor-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot legend-dot-brand"></div> 目标品牌</div>
      <div class="legend-item"><div class="legend-dot legend-dot-elevator"></div> 客梯</div>
      <div class="legend-item"><div class="legend-dot legend-dot-entrance"></div> 入口</div>
      <div class="legend-item"><div class="legend-line"></div> 导航路线</div>
    </div>
  </div>

  <!-- 右：导航面板 -->
  <div class="panel-right">
    <div class="nav-panel" id="nav-panel">
      <div class="nav-title">导航路线</div>
      <div class="nav-empty">
        <div class="nav-empty-icon">🗺️</div>
        点击左侧品牌开始导航
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// 数据：楼层平面图 + 品牌坐标 + 客梯坐标 + 入口坐标
// 坐标系：viewBox="0 0 800 600"（统一）
// ============================================================

// 楼层图 base URL（内网/本地路径，切换时请改这里）
// 本地开发用相对路径 ./maps/，部署时请改成 CDN/OSS URL
const MAP_BASE = './maps/';

const FLOORS = {
  'L4': { name: 'L4层', img: 'floor_6.jpg', color: '#e8c84a' },
  'L3': { name: 'L3层', img: 'floor_5.jpg', color: '#e8c84a' },
  'L2': { name: 'L2层', img: 'floor_4.jpg', color: '#e8c84a' },
  'L1': { name: 'L1层', img: 'floor_3.jpg', color: '#e8c84a' },
  'B1': { name: 'B1层', img: 'floor_2.jpg', color: '#e8c84a' },
  'outdoor': { name: '外场总图', img: 'floor_1.jpg', color: '#e8c84a' },
};

const floorOrder = ['L4', 'L3', 'L2', 'L1', 'B1', 'outdoor'];

// 客梯坐标（各楼层统一的电梯位置，作为跨楼层中转点）
const ELEVATORS = {
  'L4': { x: 520, y: 90 },
  'L3': { x: 520, y: 90 },
  'L2': { x: 520, y: 90 },
  'L1': { x: 520, y: 90 },
  'B1': { x: 520, y: 90 },
};

// 入口坐标（地面层）
const ENTRANCES = {
  'outdoor': [
    { id: 'metro', name: '地铁口', x: 250, y: 480 },
    { id: 'north', name: '北门', x: 400, y: 60 },
    { id: 'escalator', name: '正门扶梯', x: 580, y: 520 },
  ],
};

// 品牌数据（铺位号 + 楼层 + 平面图坐标[x%, y%]）
// 坐标为相对于图宽/高的百分比（0~100），会自动换算为 viewBox 坐标
const BRANDS = [
  // B1层
  { name: '瑞幸咖啡', floor: 'B1', code: 'B138', x: 20, y: 45, location: 'B138' },
  { name: '名创优品', floor: 'B1', code: 'B142', x: 35, y: 45, location: 'B142' },
  { name: '周大福', floor: 'B1', code: 'B136', x: 55, y: 30, location: 'B136' },
  { name: '味千拉面', floor: 'B1', code: 'B148', x: 65, y: 55, location: 'B148' },
  { name: '乐凯撒', floor: 'B1', code: 'B116', x: 15, y: 60, location: 'B116' },
  { name: '探炉', floor: 'B1', code: 'B155', x: 70, y: 65, location: 'B155' },
  { name: '元初食品', floor: 'B1', code: 'B143', x: 40, y: 50, location: 'B143' },
  // L1层
  { name: '奈雪的茶', floor: 'L1', code: 'L109', x: 20, y: 40, location: 'L109' },
  { name: '星巴克', floor: 'L1', code: 'L117', x: 50, y: 50, location: 'L117' },
  { name: '周大福', floor: 'L1', code: 'L103', x: 55, y: 20, location: 'L103' },
  { name: '霸王茶姬', floor: 'L1', code: 'L116D', x: 35, y: 55, location: 'L116D' },
  { name: '华为', floor: 'L1', code: 'L127A', x: 70, y: 30, location: 'L127A' },
  { name: 'M Stand', floor: 'L1', code: 'L108A', x: 72, y: 20, location: 'L108A' },
  // L2层
  { name: '元气寿司', floor: 'L2', code: 'L218', x: 20, y: 50, location: 'L218' },
  { name: 'Meland club', floor: 'L2', code: 'L222', x: 30, y: 40, location: 'L222' },
  { name: '阿迪达斯', floor: 'L2', code: 'L304A', x: 65, y: 35, location: 'L304A' },
  { name: '回力', floor: 'L2', code: 'L307', x: 55, y: 60, location: 'L307' },
  // L3层
  { name: '李宁', floor: 'L3', code: 'L304', x: 60, y: 30, location: 'L304' },
  { name: '星际传奇', floor: 'L3', code: 'L303', x: 30, y: 30, location: 'L303' },
  { name: '外婆家', floor: 'L3', code: 'L314', x: 20, y: 55, location: 'L314' },
  { name: '京味张', floor: 'L3', code: 'L317', x: 35, y: 55, location: 'L317' },
  // L4层
  { name: '太二酸菜鱼', floor: 'L4', code: 'L408', x: 40, y: 50, location: 'L408' },
  { name: '八合里', floor: 'L4', code: 'L427', x: 70, y: 55, location: 'L427' },
  { name: '中影天川影城', floor: 'L4', code: 'L418', x: 55, y: 35, location: 'L418' },
  { name: '常乐推拿', floor: 'L4', code: 'L406', x: 25, y: 40, location: 'L406' },
];

// ============================================================
// 全局状态
// ============================================================
let currentFloor = 'L1';
let selectedBrand = null;
let searchQuery = '';

// ============================================================
// 初始化
// ============================================================
function init() {
  buildFloorPills();
  renderBrandList();
  setFloor('L1');
}

// ============================================================
// 楼层切换
// ============================================================
function buildFloorPills() {
  const container = document.getElementById('floor-pills');
  container.innerHTML = '';
  floorOrder.forEach(fid => {
    const f = FLOORS[fid];
    const el = document.createElement('button');
    el.className = 'floor-pill' + (fid === currentFloor ? ' active' : '');
    el.textContent = f.name;
    el.addEventListener('click', () => setFloor(fid));
    container.appendChild(el);
  });
}

function setFloor(fid) {
  currentFloor = fid;

  // 更新楼层按钮
  document.querySelectorAll('.floor-pill').forEach(el => {
    el.classList.toggle('active', el.textContent === FLOORS[fid].name);
  });

  // 加载楼层图
  const img = document.getElementById('floor-img');
  img.src = MAP_BASE + FLOORS[fid].img;

  // 等图片加载后重绘 SVG 标记
  img.onload = () => {
    resizeSvg();
    renderMarkers();
  };
}

// ============================================================
// 响应式 SVG
// ============================================================
function resizeSvg() {
  const img = document.getElementById('floor-img');
  const svg = document.getElementById('floor-svg');
  const wrap = document.getElementById('floor-img-wrap');
  const rect = img.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  // SVG viewBox 固定 800x600，等比缩放
  const scaleX = rect.width / 800;
  const scaleY = rect.height / 600;
  const scale = Math.min(scaleX, scaleY);

  // 居中偏移
  const offsetX = (rect.width - 800 * scale) / 2;
  const offsetY = (rect.height - 600 * scale) / 2;

  svg.style.width = rect.width + 'px';
  svg.style.height = rect.height + 'px';
  svg.style.left = offsetX + 'px';
  svg.style.top = offsetY + 'px';
  svg.setAttribute('viewBox', '0 0 800 600');
}

window.addEventListener('resize', () => {
  if (document.getElementById('floor-img').complete) {
    resizeSvg();
    renderMarkers();
  }
});

// ============================================================
// 绘制标记
// ============================================================
function renderMarkers() {
  const svg = document.getElementById('floor-svg');
  const entrances = ENTRANCES[currentFloor] || [];
  const elevator = ELEVATORS[currentFloor];

  let html = '';

  // 外场：显示入口
  if (currentFloor === 'outdoor') {
    entrances.forEach(e => {
      html += circle(e.x, e.y, 10, '#2ed573', '#fff', 'entrance');
      html += text(e.x, e.y - 16, e.name, '#2ed573', 11, 'middle');
    });
  }

  // 客梯（除户外）
  if (elevator) {
    html += rect(elevator.x - 16, elevator.y - 16, 32, 32, 'rgba(212,175,55,0.2)', '#d4af37', 'elevator');
    html += text(elevator.x, elevator.y + 4, '电梯', '#d4af37', 10, 'middle', 'bold');
  }

  // 当前楼层图上：当前楼层的品牌
  const brandsHere = BRANDS.filter(b => b.floor === currentFloor);
  brandsHere.forEach(b => {
    const isTarget = selectedBrand && selectedBrand.name === b.name;
    if (isTarget) {
      // 目标品牌：红色脉冲 + 标签
      html += circle(b.x, b.y, 12, '#ff4757', '#fff', 'brand');
      html += `<circle cx="${b.x}" cy="${b.y}" r="18" fill="none" stroke="#ff4757" stroke-width="2" opacity="0.5">
        <animate attributeName="r" values="12;24" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0" dur="1.5s" repeatCount="indefinite"/>
      </circle>`;
      html += text(b.x, b.y - 18, b.name, '#ff4757', 12, 'middle', 'bold');
    } else {
      // 普通品牌：灰色小点
      html += circle(b.x, b.y, 6, 'rgba(255,255,255,0.3)', 'rgba(255,255,255,0.5)', 'brand-dim');
    }
  });

  // 如果选了目标：画路线
  if (selectedBrand && selectedBrand.floor !== 'outdoor') {
    drawRoute(selectedBrand, html, svg);
  } else {
    svg.innerHTML = html;
  }
}

function drawRoute(brand, extraHtml, svg) {
  const elev = ELEVATORS[currentFloor];
  const bx = brand.x;
  const by = brand.y;

  let pathD = '';

  if (currentFloor === brand.floor) {
    // 同层：从电梯画到品牌
    pathD = `M ${elev.x} ${elev.y} L ${bx} ${by}`;
  } else {
    // 跨层：画到电梯为止（另一层用文字提示）
    pathD = `M ${elev.x} ${elev.y} L ${bx} ${by}`;
  }

  // 虚线流动动画路径
  const animatedPath = `
    <defs>
      <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#70a1ff;stop-opacity:0"/>
        <stop offset="30%" style="stop-color:#70a1ff;stop-opacity:1"/>
        <stop offset="70%" style="stop-color:#70a1ff;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#70a1ff;stop-opacity:0"/>
      </linearGradient>
    </defs>
    <path d="${pathD}" fill="none" stroke="rgba(112,161,255,0.4)" stroke-width="6" stroke-linecap="round"/>
    <path d="${pathD}" fill="none" stroke="#70a1ff" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 6">
      <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="0.8s" repeatCount="indefinite"/>
    </path>
  `;

  svg.innerHTML = extraHtml + animatedPath;
}

// SVG 辅助
function circle(x, y, r, fill, stroke, cls) {
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" class="marker-${cls}"/>`;
}
function rect(x, y, w, h, fill, stroke, cls) {
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" rx="4" class="marker-${cls}"/>`;
}
function text(x, y, content, fill, fontSize, anchor, fontWeight) {
  return `<text x="${x}" y="${y}" fill="${fill}" font-size="${fontSize}" text-anchor="${anchor}" font-weight="${fontWeight||'normal'}" font-family="PingFang SC, sans-serif">${content}</text>`;
}

// ============================================================
// 品牌列表
// ============================================================
function renderBrandList() {
  const container = document.getElementById('brand-list');
  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? BRANDS.filter(b => b.name.toLowerCase().includes(q) || b.code.toLowerCase().includes(q))
    : BRANDS;

  container.innerHTML = filtered.map(b => `
    <div class="brand-item${selectedBrand && selectedBrand.name === b.name ? ' selected' : ''}"
         onclick="selectBrand(${BRANDS.indexOf(b)})">
      <div class="brand-item-name">${b.name}</div>
      <div class="brand-item-floor">${FLOORS[b.floor].name}</div>
      <div class="brand-item-loc">${b.location}</div>
    </div>
  `).join('');
}

function selectBrand(idx) {
  selectedBrand = BRANDS[idx];
  renderBrandList();
  renderNavPanel();
  // 自动切换到品牌所在楼层
  if (selectedBrand.floor !== 'outdoor') {
    setFloor(selectedBrand.floor);
  }
}

// ============================================================
// 导航面板
// ============================================================
function renderNavPanel() {
  const panel = document.getElementById('nav-panel');
  if (!selectedBrand) {
    panel.innerHTML = `
      <div class="nav-title">导航路线</div>
      <div class="nav-empty"><div class="nav-empty-icon">🗺️</div>点击左侧品牌开始导航</div>
    `;
    return;
  }

  const brand = selectedBrand;
  const startFloor = 'L1'; // 固定起点：L1客梯
  const targetFloor = brand.floor;

  const steps = buildNavSteps(startFloor, targetFloor, brand);

  let html = `
    <div class="nav-title">导航路线</div>
    <div class="nav-brand-name">${brand.name}</div>
    <div class="nav-brand-loc">${brand.location} · ${FLOORS[brand.floor].name}</div>
  `;

  // 起点
  html += `<div class="route-poi"><div class="poi-dot poi-start"></div><span>起点：L1层 客服台（客梯旁）</span></div>`;

  steps.forEach((step, i) => {
    const isCurrent = i === 0;
    html += `
      <div class="nav-step">
        <div class="nav-step-header">
          <div class="step-num${isCurrent ? ' current' : ''}">${isCurrent ? '▶' : (i + 1)}</div>
          <div class="step-floor">${step.floor}</div>
        </div>
        <div class="step-desc">${step.desc}</div>
        ${step.tip ? `<div class="step-tip">💡 ${step.tip}</div>` : ''}
      </div>
    `;
  });

  // 终点
  html += `<div class="route-poi"><div class="poi-dot poi-end"></div><span>终点：${brand.name}（${brand.location}）</span></div>`;

  panel.innerHTML = html;
}

function buildNavSteps(startFloor, targetFloor, brand) {
  const steps = [];

  if (startFloor === targetFloor) {
    // 同层
    steps.push({
      floor: FLOORS[targetFloor].name,
      desc: `从<span class="step-highlight">L1客梯</span>出发，<span class="step-highlight">步行${getDistanceStr(ELEVATORS['L1'], brand)}</span>直达 ${brand.name}`,
      tip: null,
    });
  } else {
    // 跨层
    // Step 1: 乘电梯到目标层
    steps.push({
      floor: startFloor + ' → ' + targetFloor,
      desc: `从<span class="step-highlight">L1客梯</span>乘电梯至<span class="step-highlight">${targetFloor}</span>`,
      tip: '电梯位于中庭东侧',
    });

    // Step 2: 从电梯走到品牌
    const elevTarget = ELEVATORS[targetFloor];
    steps.push({
      floor: FLOORS[targetFloor].name,
      desc: `到达${targetFloor}客梯后，<span class="step-highlight">步行${getDistanceStr(elevTarget, brand)}</span>到达 ${brand.name}`,
      tip: null,
    });
  }

  return steps;
}

// 估算步行距离（像素距离换算成米）
function getDistanceStr(from, to) {
  const dx = from.x - to.x;
  const dy = from.y - to.y;
  const px = Math.sqrt(dx * dx + dy * dy);
  const meters = Math.round(px * 0.08); // 假设 viewBox 800px ≈ 实际 64m → 1px ≈ 0.08m
  if (meters < 10) return '约5米';
  if (meters < 30) return '约10-20米';
  if (meters < 60) return '约20-40米';
  return `约${meters}米`;
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderBrandList();
});

init();
