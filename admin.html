<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KK MALL 积分管理后台</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f2ec;color:#1a1008}
    #app{max-width:960px;margin:0 auto;padding:20px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    h1{font-size:22px;color:#1a1008}
    .headerRight{display:flex;align-items:center;gap:16px}
    .filters{display:flex;gap:6px}
    .filterBtn{
      border:1.5px solid #e0d8c8;border-radius:8px;padding:6px 16px;
      background:#fff;color:#888;font-size:13px;cursor:pointer;
      transition:all .15s;
    }
    .filterBtn.active{background:#C5962A;color:#fff;border-color:#C5962A}
    .filterBtn:hover:not(.active){background:#faf8f4}
    .badge{
      background:#e74c3c;color:#fff;font-size:11px;font-weight:bold;
      border-radius:10px;padding:2px 7px;margin-left:4px;
    }
    .refreshBtn{
      border:none;border-radius:8px;padding:6px 12px;
      background:#1a1008;color:#C5962A;font-size:13px;cursor:pointer;
    }
    .refreshBtn:active{opacity:.8}
    .stats{display:flex;gap:12px;margin-bottom:24px}
    .statCard{
      flex:1;background:#fff;border-radius:12px;padding:16px 20px;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
    }
    .statCard .num{font-size:28px;font-weight:bold;color:#C5962A}
    .statCard .label{font-size:12px;color:#888;margin-top:2px}
    #cardList{display:flex;flex-direction:column;gap:16px}
    .card{
      background:#fff;border-radius:14px;overflow:hidden;
      box-shadow:0 1px 6px rgba(0,0,0,.07);
      display:flex;transition:opacity .2s;
    }
    .card.processed{opacity:.6}
    .cardImg{
      width:200px;min-height:150px;background:#111;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;cursor:pointer;position:relative;
    }
    .cardImg img{width:100%;height:100%;object-fit:cover;display:block}
    .cardImg .noImg{color:#666;font-size:13px}
    .cardImg .zoomHint{
      position:absolute;bottom:6px;right:6px;
      background:rgba(0,0,0,.6);color:#fff;font-size:11px;
      padding:2px 8px;border-radius:4px;
    }
    .cardInfo{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
    .phone{font-size:18px;font-weight:bold}
    .note{font-size:14px;color:#666;line-height:1.5}
    .time{font-size:12px;color:#aaa}
    .statusRow{display:flex;align-items:center;gap:10px;margin-top:auto}
    .statusTag{
      display:inline-block;padding:3px 10px;border-radius:6px;
      font-size:12px;font-weight:bold;
    }
    .statusTag.pending{background:#fff3cd;color:#856404}
    .statusTag.processed{background:#d4edda;color:#155724}
    .btnProcess{
      border:none;border-radius:8px;padding:5px 14px;
      font-size:12px;cursor:pointer;font-weight:bold;
      transition:background .15s;
    }
    .btnProcess.mark{background:#C5962A;color:#fff}
    .btnProcess.mark:hover{background:#a87d22}
    .btnProcess.undo{background:#f0ede6;color:#888}
    .empty{text-align:center;padding:60px 20px;color:#bbb;font-size:16px}
    .error-msg{text-align:center;padding:20px;color:#e74c3c;font-size:14px}
    #imgModal{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.85);
      justify-content:center;align-items:center;cursor:zoom-out;
    }
    #imgModal.show{display:flex}
    #imgModal img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
    @media(max-width:640px){
      .card{flex-direction:column}
      .cardImg{width:100%;min-height:120px;max-height:200px}
      .stats{flex-direction:column}
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🏢 KK MALL 积分管理</h1>
      <div class="headerRight">
        <div class="filters">
          <button class="filterBtn active" id="btnPending" onclick="loadData('pending')">待处理<span class="badge" id="pendingBadge" style="display:none">0</span></button>
          <button class="filterBtn" id="btnAll" onclick="loadData('all')">全部</button>
          <button class="filterBtn" id="btnProcessed" onclick="loadData('processed')">已处理</button>
        </div>
        <button class="refreshBtn" onclick="loadData(currentFilter)">🔄 刷新</button>
      </div>
    </header>

    <div class="stats">
      <div class="statCard"><div class="num" id="statPending">-</div><div class="label">待处理</div></div>
      <div class="statCard"><div class="num" id="statToday">-</div><div class="label">今日提交</div></div>
      <div class="statCard"><div class="num" id="statTotal">-</div><div class="label">累计提交</div></div>
    </div>

    <div id="cardList"><div class="empty">加载中…</div></div>
  </div>

  <div id="imgModal" onclick="this.classList.remove('show')">
    <img id="imgModalSrc" src="" alt="查看大图">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    var SUPABASE_URL = 'https://sbdqkzfwuczkbudeocks.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZHFremZ3dWN6a2J1ZGVvY2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzEyNDQsImV4cCI6MjA5MjM0NzI0NH0.M47ReMoGMYtCcqDk6grxYlakUxzOJnd_nOVR6HPI8TE';
    var NTFY_TOPIC = 'kk-mall-jifen';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var currentFilter = 'pending';
    var pollingTimer = null;
    var refreshing = false;             // 防重复刷新

    // --- 轮询控制（1分钟自动刷新）---
    function startPolling() {
      stopPolling();
      pollingTimer = setInterval(function() {
        if (!refreshing) loadData(currentFilter);
      }, 60000);
    }

    function stopPolling() {
      if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
    }

    function showError(msg) {
      document.getElementById('cardList').innerHTML = '<div class="error-msg">⚠️ ' + msg + '</div>';
    }

    function renderCards(items) {
      var el = document.getElementById('cardList');
      if (!items || !items.length) {
        el.innerHTML = '<div class="empty">📭 暂无记录</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var cls = it.status === 'processed' ? 'processed' : '';
        var imgHtml = it.image_base64
          ? '<img src="' + it.image_base64 + '" alt="小票"><div class="zoomHint">🔍 点击查看</div>'
          : '<div class="noImg">无图片</div>';
        var noteHtml = it.note ? '<div class="note">📝 ' + escHtml(it.note) + '</div>' : '';
        var statusHtml = it.status === 'pending'
          ? '<span class="statusTag pending">⏳ 待处理</span><button class="btnProcess mark" onclick="markDone(\'' + it.id + '\')">标记已处理</button>'
          : '<span class="statusTag processed">✅ 已处理</span><button class="btnProcess undo" onclick="markUndo(\'' + it.id + '\')">撤回</button>';
        html += '<div class="card ' + cls + '">\
          <div class="cardImg" onclick="viewImage(\'' + (it.image_base64 ? '1' : '') + '\')">' + imgHtml + '</div>\
          <div class="cardInfo">\
            <div class="phone">📱 ' + it.phone + '</div>' + noteHtml + '\
            <div class="time">🕐 ' + fmtTime(it.created_at) + '</div>\
            <div class="statusRow">' + statusHtml + '</div>\
          </div>\
        </div>';
      }
      el.innerHTML = html;
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtTime(iso) {
      var d = new Date(iso);
      return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function loadStats() {
      sb.from('jifen_submissions').select('*', { count: 'exact', head: true }).eq('status', 'pending')
        .then(function(r) {
          var p = r.count || 0;
          document.getElementById('statPending').textContent = p;
          var badge = document.getElementById('pendingBadge');
          if (p > 0) { badge.textContent = p; badge.style.display = ''; }
          else { badge.style.display = 'none'; }
        });
      var today = new Date(); today.setHours(0,0,0,0);
      sb.from('jifen_submissions').select('*', { count: 'exact', head: true }).gte('created_at', today.toISOString())
        .then(function(r) { document.getElementById('statToday').textContent = r.count || 0; });
      sb.from('jifen_submissions').select('*', { count: 'exact', head: true })
        .then(function(r) { document.getElementById('statTotal').textContent = r.count || 0; });
    }

    function loadData(filter) {
      if (refreshing) return;
      if (filter !== undefined) {
        currentFilter = filter;
        var btns = document.querySelectorAll('.filterBtn');
        for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
        var idMap = { pending: 'btnPending', all: 'btnAll', processed: 'btnProcessed' };
        var el = document.getElementById(idMap[filter] || 'btnPending');
        if (el) el.classList.add('active');
      }
      refreshing = true;
      document.getElementById('cardList').innerHTML = '<div class="empty">加载中…</div>';
      sb.from('jifen_submissions').select('*').order('created_at', { ascending: false })
        .then(function(res) {
          refreshing = false;
          if (res.error) {
            showError('数据加载失败：' + res.error.message);
            console.error(res.error);
            return;
          }
          var items = currentFilter === 'all' ? res.data : res.data.filter(function(d) { return d.status === currentFilter; });
          renderCards(items);
          loadStats();
        })
        .catch(function(err) {
          refreshing = false;
          showError('网络错误，请检查网络连接');
          console.error(err);
        });
    }

    function markDone(id) {
      sb.from('jifen_submissions').update({ status: 'processed' }).eq('id', id)
        .then(function() { loadData(currentFilter); });
    }
    function markUndo(id) {
      sb.from('jifen_submissions').update({ status: 'pending' }).eq('id', id)
        .then(function() { loadData(currentFilter); });
    }
    function viewImage(src) {
      if (!src) return;
      document.getElementById('imgModalSrc').src = src;
      document.getElementById('imgModal').classList.add('show');
    }

    // 启动 ntfy（不阻塞加载）
    startNtfy();

    // 启动 1 分钟轮询
    startPolling();

    // 初始加载（加上5秒超时兜底）
    var loadTimer = setTimeout(function() {
      var el = document.getElementById('cardList');
      if (el && el.innerHTML.indexOf('加载中') !== -1) {
        showError('加载超时，请刷新页面重试');
      }
    }, 5000);
    loadData(currentFilter);
    clearTimeout(loadTimer);
  </script>
</body>
</html>
