<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KK MALL 积分监控</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;font-family:system-ui,-apple-system,sans-serif;background:#0c0a06;color:#f0ebe0}
    body{padding:16px 16px env(safe-area-inset-bottom, 16px)}

    .header{text-align:center;padding:12px 0 20px}
    .header h1{font-size:20px;color:#C5962A;margin-bottom:8px}
    .status{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#888}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot.on{background:#22c55e;box-shadow:0 0 8px #22c55e}
    .dot.off{background:#ef4444;box-shadow:0 0 6px #ef4444}
    .dot.wait{background:#eab308;animation:blink 1s infinite}
    @keyframes blink{50%{opacity:.3}}

    .soundToggle{
      margin-top:10px;display:inline-flex;align-items:center;gap:6px;
      font-size:12px;color:#888;cursor:pointer;
    }
    .soundToggle input{accent-color:#C5962A}

    .list{max-width:520px;margin:0 auto}
    .card{
      background:#1a1508;border:1px solid #2a2210;border-radius:14px;
      padding:14px;margin-bottom:14px;
      animation:fadeUp .3s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .card img{
      width:100%;border-radius:8px;margin-bottom:10px;
      background:#111;max-height:360px;object-fit:contain;
    }
    .card .phone{font-size:22px;font-weight:bold;color:#C5962A;letter-spacing:1px}
    .card .time{font-size:12px;color:#666;margin-top:4px}
    .card .note{font-size:14px;color:#aaa;margin-top:6px;padding:6px 10px;background:#0f0d08;border-radius:8px}

    .empty{text-align:center;color:#444;padding:80px 20px;font-size:15px}
    .empty .icon{font-size:48px;margin-bottom:12px;opacity:.4}

    .badge{
      display:inline-block;background:#C5962A;color:#fff;
      border-radius:8px;padding:2px 8px;font-size:11px;font-weight:bold;
      margin-left:8px;vertical-align:middle;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏪 KK MALL 积分监控 <span class="badge" id="countBadge" style="display:none">0</span></h1>
    <div class="status">
      <span class="dot wait" id="dot"></span>
      <span id="statusText">连接中…</span>
    </div>
    <div style="margin-top:10px">
      <label class="soundToggle">
        <input type="checkbox" id="soundOn" checked> 🔔 声音提醒
      </label>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty" id="emptyMsg">
      <div class="icon">📡</div>
      等待顾客提交…
    </div>
  </div>

  <script>
    // ===== ⚠️ 配置区：把你的 Supabase 凭据填这里 =====
    const SUPABASE_URL = 'https://sbdqkzfwuczkbudeocks.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZHFremZ3dWN6a2J1ZGVvY2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzEyNDQsImV4cCI6MjA5MjM0NzI0NH0.M47ReMoGMYtCcqDk6grxYlakUxzOJnd_nOVR6HPI8TE';
    // ================================================

    if (SUPABASE_URL.startsWith('__')) {
      document.getElementById('statusText').textContent = '未配置 Supabase';
      document.getElementById('dot').className = 'dot off';
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let count = 0;

    // ── 1. 加载历史数据 ──
    async function loadHistory() {
      try {
        const { data, error } = await sb
          .from('submissions')
          .select('*')
          .order('created_at', { ascending: true })
          .limit(100);
        if (error) throw error;
        if (data && data.length) {
          document.getElementById('emptyMsg')?.remove();
          data.forEach(row => addCard(row));
          count = data.length;
          const badge = document.getElementById('countBadge');
          badge.textContent = count;
          badge.style.display = 'inline-block';
        }
      } catch (err) {
        console.error('Load history failed:', err);
      }
    }

    // ── 2. 实时监听新插入 ──
    const channel = sb.channel('mall-jifen-db')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'submissions' },
        (payload) => {
          addCard(payload.new);
          count++;
          const badge = document.getElementById('countBadge');
          badge.textContent = count;
          badge.style.display = 'inline-block';
          if (document.getElementById('soundOn').checked) playSound();
        }
      )
      .subscribe((status, err) => {
        const dot = document.getElementById('dot');
        const text = document.getElementById('statusText');
        if (status === 'SUBSCRIBED') {
          dot.className = 'dot on';
          text.textContent = '已连接 · 实时监听中';
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          dot.className = 'dot off';
          text.textContent = '连接断开';
          console.error('Channel error:', err);
        } else {
          dot.className = 'dot wait';
          text.textContent = '连接中…';
        }
      });

    loadHistory();

    function addCard(data) {
      document.getElementById('emptyMsg')?.remove();
      const list = document.getElementById('list');
      const card = document.createElement('div');
      card.className = 'card';
      // 数据库行用 created_at，Broadcast 用 time
      const timeDisplay = data.created_at
        ? new Date(data.created_at).toLocaleString('zh-CN', { hour12: false })
        : data.time || '';
      card.innerHTML =
        '<img src="' + data.image + '" alt="小票">' +
        '<div class="phone">\uD83D\uDCF1 ' + data.phone + '</div>' +
        '<div class="time">\uD83D\uDD50 ' + timeDisplay + '</div>' +
        (data.note ? '<div class="note">\uD83D\uDCDD ' + data.note + '</div>' : '');
      list.prepend(card);
    }

    function playSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.35, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } catch(e) {}
    }
  </script>
</body>
</html>
