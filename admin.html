<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KK MALL 积分管理后台</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'PingFang SC',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
  header{background:#16213e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460;position:sticky;top:0;z-index:100}
  header h1{color:#e94560;font-size:20px;font-weight:600}
  .stat{color:#888;font-size:13px}
  .stat span{color:#e94560;font-weight:700;margin-left:4px}
  .top-bar{background:#0f3460;padding:10px 24px;display:flex;align-items:center;gap:12px;font-size:13px;color:#888;flex-wrap:wrap}
  .top-bar code{color:#e94560;font-size:14px;font-family:monospace}
  .beep{background:#e94560;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin-left:auto}
  .beep:hover{background:#c73e54}
  .conn-status{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:6px}
  .conn-status.connected{background:#4ade80;box-shadow:0 0 6px #4ade80}
  .conn-status.error{background:#f87171}
  #log{list-style:none;padding:20px;max-width:700px;margin:0 auto}
  #log li{background:#16213e;margin-bottom:12px;padding:16px 20px;border-radius:10px;border-left:4px solid #e94560;animation:slideIn .3s ease}
  #log li.new{animation:flash .6s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  @keyframes flash{0%,100%{background:#16213e}50%{background:#2a1a3a}}
  .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .tag{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .tag-phone{background:#e94560;color:#fff}
  .tag-amount{background:#1a5c1a;color:#90ee90}
  .note{font-size:13px;color:#aaa;margin-top:6px;padding:6px 10px;background:#0a0a1a;border-radius:6px;line-height:1.5}
  .time{font-size:12px;color:#555;margin-top:8px}
  .img-preview{max-width:180px;border-radius:6px;margin-top:8px;cursor:pointer;display:block}
  .empty{text-align:center;padding:60px;color:#555;font-size:15px}
  .img-wrap{margin-top:8px}
  .img-wrap img{max-width:200px;border-radius:6px;cursor:pointer;border:1px solid #333;display:block}
</style>
</head>
<body>
<header>
  <h1>📋 KK MALL 积分管理</h1>
  <div class="stat">共 <span id="count">0</span> 条</div>
</header>
<div class="top-bar">
  <span id="conn" class="conn-status"></span>
  <span id="connLabel">连接中…</span>
  <span>Topic：</span>
  <code>kk-mall-jifen-2026</code>
  <button class="beep" onclick="testBeep()">🔔 提示音</button>
</div>
<ul id="log"><li class="empty">等待积分提交通知…</li></ul>

<script>
const TOPIC = 'kk-mall-jifen-2026';
let audioCtx = null;
let count = 0;
let knownIds = new Set();

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep() {
  if (!audioCtx) initAudio();
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) { console.log('audio err', e); }
}

function tripleBeep() { beep(); setTimeout(beep, 200); setTimeout(beep, 400); }

function testBeep() { tripleBeep(); alert('提示音测试，听到响了吗？'); }

function render(item) {
  const phone = item.phone || '';
  const last4 = phone.length >= 4 ? phone.slice(-4) : phone;
  const note = item.note || '';
  const time = item.time || '';
  const img = item.image || '';
  const imgTag = img ? '<div class="img-wrap"><img src="' + img + '" class="img-preview" onclick="window.open(this.src)" title="点击放大查看"></div>' : '';
  return '<li class="new">' +
    '<div class="tags">' +
      '<span class="tag tag-phone">📱 ' + phone + '</span>' +
      (note ? '<span class="tag tag-amount">💰 ¥' + note + '</span>' : '') +
    '</div>' +
    (note ? '<div class="note">📝 小票 ¥' + note + '</div>' : '') +
    imgTag +
    '<div class="time">🕐 ' + time + '</div>' +
  '</li>';
}

function addItem(item) {
  count++;
  document.getElementById('count').textContent = count;
  document.querySelector('.empty')?.remove();
  const li = document.createElement('li');
  li.className = 'new';
  li.innerHTML = render(item);
  document.getElementById('log').prepend(li);
  tripleBeep();
  // 触发 Windows 桌面通知
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('KK MALL 积分提交', { body: phone + ' 提交了小票 ¥' + (note||'-'), icon: '' });
  }
}

// 连接 ntfy.sh SSE
const evtSource = new EventSource('https://ntfy.sh/' + TOPIC + '/sse');

evtSource.onopen = () => {
  document.getElementById('conn').className = 'conn-status connected';
  document.getElementById('connLabel').textContent = '已连接 ntfy.sh';
  console.log('SSE connected');
};

evtSource.onerror = () => {
  document.getElementById('conn').className = 'conn-status error';
  document.getElementById('connLabel').textContent = '连接断开，3秒后重连…';
  setTimeout(() => location.reload(), 3000);
};

// ntfy.sh SSE 用 message 事件发送通知数据
evtSource.onmessage = e => {
  try {
    const data = JSON.parse(e.data);
    if (data.event === 'message') {
      console.log('ntfy message:', data);
    }
  } catch(err) {}
};

evtSource.addEventListener('message', e => {
  try {
    // SSE data field contains the full ntfy message envelope
    const env = JSON.parse(e.data);
    // 忽略 open 心跳消息
    if (env.event === 'open') return;
    // 避免重复（网络重连后 ntfy 可能会重发最近一条消息）
    if (env.id && knownIds.has(env.id)) return;
    if (env.id) knownIds.add(env.id);
    // 实际数据在 message 字段（JSON 字符串）
    const payload = typeof env.message === 'string' ? JSON.parse(env.message) : env;
    if (payload.phone) addItem(payload);
  } catch(err) {
    console.log('non-json message:', e.data.substring(0, 100));
  }
});

evtSource.addEventListener('open', () => {
  document.getElementById('conn').className = 'conn-status connected';
});

// 请求桌面通知权限
if ('Notification' in window) Notification.requestPermission();
</script>
</body>
</html>
