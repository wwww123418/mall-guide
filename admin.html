<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KK MALL 积分管理后台</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f2ec;color:#1a1008}
    #app{max-width:960px;margin:0 auto;padding:20px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    h1{font-size:22px;color:#1a1008}
    .headerRight{display:flex;align-items:center;gap:16px}
    .filters{display:flex;gap:6px}
    .filterBtn{
      border:1.5px solid #e0d8c8;border-radius:8px;padding:6px 16px;
      background:#fff;color:#888;font-size:13px;cursor:pointer;
      transition:all .15s;
    }
    .filterBtn.active{background:#C5962A;color:#fff;border-color:#C5962A}
    .filterBtn:hover:not(.active){background:#faf8f4}
    .badge{
      background:#e74c3c;color:#fff;font-size:11px;font-weight:bold;
      border-radius:10px;padding:2px 7px;margin-left:4px;
    }
    .refreshBtn{
      border:none;border-radius:8px;padding:6px 12px;
      background:#1a1008;color:#C5962A;font-size:13px;cursor:pointer;
    }
    .refreshBtn:active{opacity:.8}

    .stats{display:flex;gap:12px;margin-bottom:24px}
    .statCard{
      flex:1;background:#fff;border-radius:12px;padding:16px 20px;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
    }
    .statCard .num{font-size:28px;font-weight:bold;color:#C5962A}
    .statCard .label{font-size:12px;color:#888;margin-top:2px}

    #cardList{display:flex;flex-direction:column;gap:16px}
    .card{
      background:#fff;border-radius:14px;overflow:hidden;
      box-shadow:0 1px 6px rgba(0,0,0,.07);
      display:flex;transition:opacity .2s;
    }
    .card.processed{opacity:.6}
    .cardImg{
      width:200px;min-height:150px;background:#111;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;cursor:pointer;position:relative;
    }
    .cardImg img{width:100%;height:100%;object-fit:cover;display:block}
    .cardImg .noImg{color:#666;font-size:13px}
    .cardImg .zoomHint{
      position:absolute;bottom:6px;right:6px;
      background:rgba(0,0,0,.6);color:#fff;font-size:11px;
      padding:2px 8px;border-radius:4px;
    }
    .cardInfo{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
    .phone{font-size:18px;font-weight:bold}
    .note{font-size:14px;color:#666;line-height:1.5}
    .time{font-size:12px;color:#aaa}
    .statusRow{display:flex;align-items:center;gap:10px;margin-top:auto}
    .statusTag{
      display:inline-block;padding:3px 10px;border-radius:6px;
      font-size:12px;font-weight:bold;
    }
    .statusTag.pending{background:#fff3cd;color:#856404}
    .statusTag.processed{background:#d4edda;color:#155724}
    .btnProcess{
      border:none;border-radius:8px;padding:5px 14px;
      font-size:12px;cursor:pointer;font-weight:bold;
      transition:background .15s;
    }
    .btnProcess.mark{background:#C5962A;color:#fff}
    .btnProcess.mark:hover{background:#a87d22}
    .btnProcess.undo{background:#f0ede6;color:#888}

    .empty{
      text-align:center;padding:60px 20px;color:#bbb;font-size:16px;
    }

    /* 图片查看弹窗 */
    #imgModal{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.85);
      justify-content:center;align-items:center;cursor:zoom-out;
    }
    #imgModal.show{display:flex}
    #imgModal img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}

    /* 密码门 */
    #lockScreen{
      position:fixed;inset:0;z-index:99999;
      background:#f5f2ec;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:20px;
    }
    #lockScreen h2{font-size:22px;color:#1a1008}
    #lockScreen p{font-size:13px;color:#888}
    #pwdInput{
      border:2px solid #e0d8c8;border-radius:10px;
      padding:12px 20px;font-size:16px;width:260px;
      text-align:center;outline:none;
      transition:border-color .2s;
    }
    #pwdInput:focus{border-color:#C5962A}
    #pwdError{color:#e74c3c;font-size:13px;display:none}
    #pwdBtn{
      border:none;border-radius:10px;padding:12px 40px;
      background:#C5962A;color:#fff;font-size:15px;cursor:pointer;
      font-weight:bold;
    }
    #pwdBtn:hover{background:#a87d22}

    @media(max-width:640px){
      .card{flex-direction:column}
      .cardImg{width:100%;min-height:120px;max-height:200px}
      .stats{flex-direction:column}
    }
  </style>
</head>
<body>

  <!-- 密码门 -->
  <div id="lockScreen">
    <h2>🔐 请输入管理员密码</h2>
    <p>访问积分管理后台</p>
    <input type="password" id="pwdInput" placeholder="输入密码后按回车" onkeydown="if(event.key==='Enter')checkPwd()">
    <div id="pwdError">密码错误，请重试</div>
    <button id="pwdBtn" onclick="checkPwd()">进入后台</button>
  </div>

  <!-- 正式后台（密码验证前隐藏） -->
  <div id="app" style="display:none">
    <header>
      <h1>🏢 KK MALL 积分管理</h1>
      <div class="headerRight">
        <div class="filters">
          <button class="filterBtn active" id="btnPending" onclick="loadData('pending')">待处理<span class="badge" id="pendingBadge" style="display:none">0</span></button>
          <button class="filterBtn" id="btnAll" onclick="loadData('all')">全部</button>
          <button class="filterBtn" id="btnProcessed" onclick="loadData('processed')">已处理</button>
        </div>
        <button class="refreshBtn" onclick="loadData(currentFilter)">🔄 刷新</button>
      </div>
    </header>

    <div class="stats">
      <div class="statCard"><div class="num" id="statPending">-</div><div class="label">待处理</div></div>
      <div class="statCard"><div class="num" id="statToday">-</div><div class="label">今日提交</div></div>
      <div class="statCard"><div class="num" id="statTotal">-</div><div class="label">累计提交</div></div>
    </div>

    <div id="cardList"><div class="empty">加载中…</div></div>
  </div>

  <!-- 图片查看 -->
  <div id="imgModal" onclick="this.classList.remove('show')">
    <img id="imgModalSrc" src="" alt="查看大图">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ 在下方引号内设置你的密码（只改这里）
    const ADMIN_PWD = 'kk123456';

    function checkPwd() {
      const v = document.getElementById('pwdInput').value;
      if (v === ADMIN_PWD) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
      } else {
        document.getElementById('pwdError').style.display = 'block';
        document.getElementById('pwdInput').value = '';
        document.getElementById('pwdInput').focus();
      }
    }

    function initApp() {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let currentFilter = 'pending';

      async function loadStats() {
        const { count: pending } = await sb.from('jifen_submissions').select('*', { count: 'exact', head: true }).eq('status', 'pending');
        const { count: total } = await sb.from('jifen_submissions').select('*', { count: 'exact', head: true });
        const today = new Date(); today.setHours(0,0,0,0);
        const { count: todayCount } = await sb.from('jifen_submissions').select('*', { count: 'exact', head: true }).gte('created_at', today.toISOString());
        document.getElementById('statPending').textContent = pending ?? '-';
        document.getElementById('statToday').textContent = todayCount ?? '-';
        document.getElementById('statTotal').textContent = total ?? '-';
        const badge = document.getElementById('pendingBadge');
        if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
        else { badge.style.display = 'none'; }
      }

      async function loadData(filter = 'pending') {
        currentFilter = filter;
        document.querySelectorAll('.filterBtn').forEach(b => b.classList.remove('active'));
        const id = 'btn' + filter.charAt(0).toUpperCase() + filter.slice(1);
        document.getElementById(id).classList.add('active');

        let q = sb.from('jifen_submissions').select('*').order('created_at', { ascending: false });
        if (filter !== 'all') q = q.eq('status', filter);
        const { data, error } = await q;
        if (error) { console.error(error); return; }
        renderCards(data || []);
        loadStats();
      }

      function renderCards(items) {
        const el = document.getElementById('cardList');
        if (!items.length) { el.innerHTML = '<div class="empty">📭 暂无记录</div>'; return; }
        el.innerHTML = items.map(it => `
          <div class="card ${it.status === 'processed' ? 'processed' : ''}">
            <div class="cardImg" onclick="viewImage('${it.image_base64 ? '1' : ''}')">
              ${it.image_base64 ? `<img src="${it.image_base64}" alt="小票"><div class="zoomHint">🔍 点击查看</div>` : '<div class="noImg">无图片</div>'}
            </div>
            <div class="cardInfo">
              <div class="phone">📱 ${it.phone}</div>
              ${it.note ? `<div class="note">📝 ${escHtml(it.note)}</div>` : ''}
              <div class="time">🕐 ${fmtTime(it.created_at)}</div>
              <div class="statusRow">
                <span class="statusTag ${it.status}">${it.status === 'pending' ? '⏳ 待处理' : '✅ 已处理'}</span>
                ${it.status === 'pending'
                  ? `<button class="btnProcess mark" onclick="markDone('${it.id}')">标记已处理</button>`
                  : `<button class="btnProcess undo" onclick="markUndo('${it.id}')">撤回</button>`}
              </div>
            </div>
          </div>
        `).join('');
      }

      function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function fmtTime(iso) {
        const d = new Date(iso);
        return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      }

      async function markDone(id) {
        await sb.from('jifen_submissions').update({ status: 'processed' }).eq('id', id);
        loadData(currentFilter);
      }
      async function markUndo(id) {
        await sb.from('jifen_submissions').update({ status: 'pending' }).eq('id', id);
        loadData(currentFilter);
      }

      function viewImage(src) {
        if (!src) return;
        const modal = document.getElementById('imgModal');
        document.getElementById('imgModalSrc').src = src;
        modal.classList.add('show');
      }

      // 实时订阅（失败不影响正常加载）
      sb.channel('admin-jifen-ch')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'jifen_submissions' }, () => {
          loadData(currentFilter);
        })
        .subscribe(status => {
          if (status === 'SUBSCRIBED') console.log('实时订阅已连接');
          else if (status === 'CHANNEL_ERROR') console.warn('实时订阅失败，将仅靠轮询刷新');
        });

      // 每3秒自动刷新
      setInterval(() => loadData(currentFilter), 3000);

      // 初始加载（带超时保护）
      let loaded = false;
      loadData('pending').then(() => { loaded = true; });
      setTimeout(() => {
        if (!loaded) {
          document.getElementById('cardList').innerHTML = '<div class="empty">📭 暂无记录</div>';
          document.getElementById('statPending').textContent = '0';
          document.getElementById('statToday').textContent = '0';
          document.getElementById('statTotal').textContent = '0';
        }
      }, 5000);
    }
  </script>
</body>
</html>
