<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京基水贝城市广场</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a1018;
    --bg-card:     #111824;
    --bg-card-hover: #182232;
    --bg-header:   #0c1520;
    --border:      rgba(74,144,226,0.15);
    --border-hover:rgba(74,144,226,0.45);
    --blue:        #4a90e2;
    --blue-light:  #74aff2;
    --blue-dim:    rgba(74,144,226,0.10);
    --blue-glow:   rgba(74,144,226,0.06);
    --text:        #e8eef5;
    --text-secondary: #8898ae;
    --text-dim:    #4a5a72;
    --white:       #ffffff;
    --shadow:      0 4px 24px rgba(0,0,0,0.5);
    --shadow-blue: 0 4px 30px rgba(74,144,226,0.12);
    --radius:      14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: var(--bg-header);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 0;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue), #2d6abf);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(74,144,226,0.3);
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--blue-light);
    letter-spacing: 2px;
  }

  .header-subtitle {
    font-size: 10px;
    color: var(--blue);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-deco {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-deco span {
    display: block;
    width: 40px; height: 1px;
    background: linear-gradient(to right, transparent, var(--blue), transparent);
  }

  .header-deco em {
    font-style: normal;
    color: var(--blue);
    font-size: 10px;
    letter-spacing: 2px;
  }

  /* Zone tabs */
  .zone-tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-top: 16px;
  }

  .zone-tabs::-webkit-scrollbar { display: none; }

  .zone-tab {
    flex-shrink: 0;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    transition: all 0.25s;
    position: relative;
    white-space: nowrap;
  }

  .zone-tab:hover { color: var(--blue-light); background: var(--blue-glow); }

  .zone-tab.active {
    color: var(--blue);
    background: var(--blue-dim);
    border-color: var(--border);
    border-bottom-color: var(--bg-header);
    font-weight: 700;
  }

  .zone-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--blue), transparent);
  }

  /* Floor tabs */
  .floor-tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 8px 20px 0;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
  }

  .floor-tabs::-webkit-scrollbar { display: none; }

  .floor-tab {
    flex-shrink: 0;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .floor-tab:hover { color: var(--blue-light); }

  .floor-tab.active {
    color: var(--blue);
    background: var(--blue-dim);
    border-color: var(--border);
    font-weight: 700;
  }

  /* Service bar */
  .service-bar {
    background: linear-gradient(135deg, #0f1828, #131f30);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
  }

  .service-bar-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .service-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .service-info svg { color: var(--blue); flex-shrink: 0; }

  .vip-hotline {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .vip-hotline strong { color: var(--blue); font-weight: 600; }

  /* Search */
  .search-wrap {
    padding: 16px;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 52px;
    z-index: 99;
  }

  .search-box {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 10px 20px;
    gap: 10px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-box:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-glow), var(--shadow-blue);
  }

  .search-box svg { flex-shrink: 0; color: var(--blue); opacity: 0.7; }

  .search-box input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    outline: none;
    color: var(--text);
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .clear-btn {
    background: none;
    border: none;
    font-size: 16px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    display: none;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--text-secondary); }
  .clear-btn.visible { display: block; }

  /* Content */
  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* Stats bar */
  .stats-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-around;
    gap: 16px;
    box-shadow: var(--shadow);
  }

  .stat-item { text-align: center; position: relative; }
  .stat-item + .stat-item::before {
    content: '';
    position: absolute;
    left: -8px; top: 50%;
    transform: translateY(-50%);
    width: 1px; height: 28px;
    background: var(--border);
  }

  .stat-num {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--blue-light), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

  /* VIP Section */
  .vip-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .vip-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .vip-header-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--blue), #2d6abf);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(74,144,226,0.3);
  }

  .vip-header-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .vip-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .vip-header-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .vip-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .vip-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    text-align: center;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .vip-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .vip-card.v-card::before { background: linear-gradient(to right, #5a5a6a, #7a7a8a); }
  .vip-card.s-card::before { background: linear-gradient(to right, #6080a0, #80a8c0); }
  .vip-card.g-card::before { background: linear-gradient(to right, #6090b0, #88b8d8); }
  .vip-card.d-card::before { background: linear-gradient(to right, #4a90e2, #74aff2); }

  .vip-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-blue);
  }

  .vip-tier { font-size: 15px; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
  .v-card .vip-tier { color: #aaa8b8; }
  .s-card .vip-tier { color: var(--blue-light); }
  .g-card .vip-tier { color: #88c0e8; }
  .d-card .vip-tier { color: var(--blue-light); }

  .vip-divider { width: 24px; height: 1px; margin: 0 auto 10px; }
  .v-card .vip-divider { background: #3a3a4a; }
  .s-card .vip-divider { background: rgba(74,144,226,0.3); }
  .g-card .vip-divider { background: rgba(100,160,210,0.3); }
  .d-card .vip-divider { background: rgba(74,144,226,0.35); }

  .vip-benefit { font-size: 11px; color: var(--text-secondary); line-height: 1.7; text-align: left; }
  .vip-benefit li { list-style: none; padding-left: 10px; position: relative; margin-bottom: 3px; }
  .v-card .vip-benefit li::before { content: '·'; position: absolute; left: 0; color: #5a5a6a; }
  .s-card .vip-benefit li::before { content: '·'; position: absolute; left: 0; color: var(--blue); opacity: 0.6; }
  .g-card .vip-benefit li::before { content: '·'; position: absolute; left: 0; color: #88c0e8; opacity: 0.6; }
  .d-card .vip-benefit li::before { content: '★'; position: absolute; left: 0; color: var(--blue-light); font-size: 8px; top: 3px; }

  .vip-cond {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.06);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .vip-cond-row { display: flex; justify-content: space-between; gap: 6px; }
  .vip-cond-row span:first-child { flex-shrink: 0; color: var(--text-secondary); }
  .vip-cond-row span:last-child { text-align: right; }
  .vip-tag-forever { color: var(--blue); font-weight: 600; }

  /* Category group */
  .cat-group { margin-bottom: 28px; }

  .cat-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-title::before {
    content: '';
    width: 20px; height: 1px;
    background: linear-gradient(to right, var(--blue), transparent);
  }

  .cat-title::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--border);
  }

  /* Brand grid */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
  }

  .brand-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .brand-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--blue), var(--blue-light), var(--blue));
    opacity: 0;
    transition: opacity 0.28s;
  }

  .brand-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, var(--blue-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.28s;
  }

  .brand-card:hover {
    transform: translateY(-3px);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-blue);
    background: var(--bg-card-hover);
  }

  .brand-card:hover::before { opacity: 1; }
  .brand-card:hover::after { opacity: 1; }

  .brand-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.35; position: relative; z-index: 1; }
  .brand-code { font-size: 10px; color: var(--text-dim); font-family: "Courier New", Courier, monospace; margin-bottom: 10px; letter-spacing: 0.5px; position: relative; z-index: 1; }

  .brand-location {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--blue-dim);
    color: var(--blue-light);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 6px;
    border: 1px solid rgba(74,144,226,0.2);
    position: relative;
    z-index: 1;
    transition: all 0.22s;
  }

  .brand-card:hover .brand-location {
    background: rgba(74,144,226,0.2);
    border-color: rgba(74,144,226,0.4);
  }

  .brand-tags {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
  }

  .badge-reno {
    display: inline-block;
    font-size: 10px;
    background: rgba(255,100,100,0.12);
    color: #e07070;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 4px;
    font-weight: 600;
    vertical-align: middle;
  }

  .brand-card.highlight { border-color: rgba(74,144,226,0.3); background: var(--bg-card-hover); }

  /* Empty state */
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-state .icon { font-size: 52px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,8,16,0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: #131e2e;
    border: 1px solid var(--border);
    border-radius: 22px 22px 0 0;
    padding: 28px 24px 48px;
    width: 100%;
    max-width: 560px;
    max-height: 82vh;
    overflow-y: auto;
    animation: slideUp 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
  }

  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle { width: 44px; height: 4px; background: rgba(74,144,226,0.3); border-radius: 2px; margin: 0 auto 24px; }

  .modal-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 20px; }
  .modal-brand-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--blue), #2d6abf); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 24px; color: #fff; font-weight: 900; box-shadow: 0 4px 16px rgba(74,144,226,0.3); }
  .modal-brand-name { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.3; }
  .modal-brand-code { font-size: 11px; color: var(--blue); font-family: "Courier New", monospace; margin-top: 4px; letter-spacing: 1px; }

  .modal-divider { height: 1px; background: var(--border); margin: 18px 0; }
  .modal-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .modal-row-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; width: 56px; flex-shrink: 0; padding-top: 3px; }
  .modal-row-value { font-size: 14px; color: var(--text); }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .modal-tag { background: var(--blue-dim); color: var(--blue-light); padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid rgba(74,144,226,0.25); }
  .modal-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.8; padding: 14px 16px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); }

  .modal-close {
    width: 100%;
    background: linear-gradient(135deg, var(--blue), #2d6abf);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 1px;
    transition: all 0.22s;
    box-shadow: 0 4px 20px rgba(74,144,226,0.3);
  }

  .modal-close:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(74,144,226,0.45); }

  /* Responsive */
  @media (max-width: 440px) {
    .brand-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stats-bar { padding: 12px 16px; }
    .stat-num { font-size: 20px; }
    .vip-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
    .vip-tier { font-size: 13px; }
    .vip-benefit { font-size: 10px; }
    .vip-section { padding: 16px 14px; }
    .vip-hotline span { display: none; }
  }

  @media (max-width: 360px) { .vip-cards { grid-template-columns: 1fr; } }

  @media (min-width: 680px) { .brand-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 960px) { .brand-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1100px) { .brand-grid { grid-template-columns: repeat(5, 1fr); } }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(74,144,226,0.3); border-radius: 2px; }

  /* Carousel */
  .carousel-overlay {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80vh;
    background: rgba(8,10,18,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    top: 10vh;
    transform: translateY(0);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    border-bottom: 1px solid rgba(74,144,226,0.15);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6), 0 8px 40px rgba(0,0,0,0.6);
  }
  .carousel-overlay.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
  .carousel-close {
    position: absolute;
    top: 12px; left: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(74,144,226,0.3);
    color: var(--blue);
    font-size: 18px;
    cursor: pointer;
    z-index: 210;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    line-height: 1;
  }
  .carousel-close:hover { background: rgba(74,144,226,0.2); }
  .carousel-track-wrap { width: 85%; max-width: 700px; height: 80%; overflow: hidden; position: relative; border-radius: 10px; }
  .carousel-track { display: flex; height: 100%; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .carousel-track.no-transition { transition: none; }
  .carousel-slide { flex: 0 0 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
  .carousel-slide img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); user-select: none; -webkit-user-drag: none; pointer-events: none; }
  .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 210; }
  .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; transition: background 0.3s, transform 0.3s; }
  .carousel-dot.active { background: var(--blue); transform: scale(1.3); }

let currentZone = '';
let currentFloor = '';
let searchQuery = '';

// Collect all zones
function getAllZones() {
  const zones = new Set();
  Object.values(DATA).forEach(floor => {
    Object.keys(floor.categories).forEach(z => zones.add(z));
  });
  return Array.from(zones);
}

// Get floors for a given zone
function getFloorsForZone(zone) {
  const floors = [];
  Object.entries(DATA).forEach(([floorKey, floor]) => {
    if (floor.categories[zone]) {
      floors.push(floorKey);
    }
  });
  return floors;
}

function initZoneTabs() {
  const container = document.getElementById('zoneTabs');
  container.innerHTML = '';
  const zones = getAllZones();
  currentZone = zones[0] || '';
  zones.forEach(zone => {
    const tab = document.createElement('div');
    tab.className = 'zone-tab' + (zone === currentZone ? ' active' : '');
    tab.textContent = zone;
    tab.onclick = () => switchZone(zone);
    container.appendChild(tab);
  });
}

function initFloorTabs() {
  const container = document.getElementById('floorTabs');
  container.innerHTML = '';
  if (!currentZone) return;
  const floors = getFloorsForZone(currentZone);
  currentFloor = floors[0] || '';
  floors.forEach(floor => {
    const tab = document.createElement('div');
    tab.className = 'floor-tab' + (floor === currentFloor ? ' active' : '');
    tab.textContent = DATA[floor].floorName;
    tab.onclick = () => switchFloor(floor);
    container.appendChild(tab);
  });
}

function switchZone(zone) {
  currentZone = zone;
  document.querySelectorAll('.zone-tab').forEach((t, i) => {
    t.classList.toggle('active', getAllZones()[i] === zone);
  });
  initFloorTabs();
  render();
}

function switchFloor(floor) {
  currentFloor = floor;
  const floors = getFloorsForZone(currentZone);
  document.querySelectorAll('.floor-tab').forEach((t, i) => {
    t.classList.toggle('active', floors[i] === floor);
  });
  render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  render();
}

document.getElementById('searchInput').addEventListener('input', function () {
  searchQuery = this.value.trim().toLowerCase();
  document.getElementById('clearBtn').classList.toggle('visible', searchQuery.length > 0);
  render();
});

        <ul class="vip-benefit">

function openModal(shop, floorName, catName, zone) {
  document.getElementById('modalName').textContent = shop.name;
  document.getElementById('modalCode').textContent = shop.code;
  document.getElementById('modalFloor').textContent = floorName;
  document.getElementById('modalZone').textContent = zone;
  document.getElementById('modalLoc').textContent = shop.location + (shop.subloc ? '（' + shop.subloc + '）' : '');
  document.getElementById('modalIcon').textContent = shop.name.charAt(0);
  const brandsInfo = shop.brands.length > 1 ? '集合品牌包括：' + shop.brands.join('、') + '。' : '';
  const tagsInfo = shop.tags ? '业态：' + shop.tags + '。' : '';
  document.getElementById('modalDesc').innerHTML = `${shop.name} 位于 ${floorName} ${zone} ${shop.location}。${tagsInfo}${brandsInfo}`;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

initZoneTabs();

render();

/* Carousel - same idle behavior */
(function() {
  const slides = ['activity1.png', 'activity2.jpg', 'activity3.jpg'];
  const total = slides.length;
  let idx = 0, timer = null, idleTimer = null;
  const INTERVAL = 4000, IDLE_DELAY = 10000;

  const overlay = document.createElement('div');
  overlay.className = 'carousel-overlay';
  overlay.id = 'carouselOverlay';
  let dotsHTML = '';
  for (let i = 0; i < total; i++) dotsHTML += '<div class="carousel-dot' + (i===0?' active':'') + '" data-i="' + i + '"></div>';
  overlay.innerHTML =
    '<button class="carousel-close" id="carouselClose">✕</button>' +
    '<div class="carousel-track-wrap">' +
      '<div class="carousel-track" id="carouselTrack">' +
        slides.map(function(s) { return '<div class="carousel-slide"><img src="' + s + '" draggable="false"></div>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="carousel-dots" id="carouselDots">' + dotsHTML + '</div>';
  document.body.appendChild(overlay);

  var track = document.getElementById('carouselTrack');
  var dots = document.getElementById('carouselDots').children;
  var closeBtn = document.getElementById('carouselClose');

  function goTo(i) {
    if (i < 0) i = total - 1;
    if (i >= total) i = 0;
    idx = i;
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    for (var d = 0; d < dots.length; d++) dots[d].classList.toggle('active', d === idx);
  }

  function startAuto() { stopAuto(); timer = setInterval(function() { goTo(idx + 1); }, INTERVAL); }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }

  function startIdleTimer() { clearIdleTimer(); idleTimer = setTimeout(function() { showCarousel(); goTo(0); startAuto(); }, IDLE_DELAY); }
  function clearIdleTimer() { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; } }

  function onUserActivity() {
    if (overlay.classList.contains('hidden')) {
      clearIdleTimer();
      startIdleTimer();
    }
  }

  function showCarousel() { overlay.classList.remove('hidden'); }
  function hideCarousel() { overlay.classList.add('hidden'); stopAuto(); startIdleTimer(); }

  closeBtn.addEventListener('click', function() { hideCarousel(); });
  for (var d = 0; d < dots.length; d++) {
    dots[d].addEventListener('click', (function(i) { return function() { stopAuto(); goTo(i); }; })(d));
  }

  // touch swipe
  var startX = 0, startY = 0, swiping = false, dx = 0;
  track.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    swiping = false; dx = 0; touchMoved = false;
    track.classList.add('no-transition');
  }, { passive: true });
  var touchMoved = false;
  track.addEventListener('touchmove', function(e) {
    touchMoved = true;
    var cx = e.touches[0].clientX, cy = e.touches[0].clientY;
    dx = cx - startX;
    if (Math.abs(cy - startY) > Math.abs(dx)) return;
    if (Math.abs(dx) > 10 && !swiping) { swiping = true; stopAuto(); }
    if (swiping) track.style.transform = 'translateX(' + (-idx * 100 + dx / track.parentElement.offsetWidth * 100) + '%)';
  }, { passive: true });
  track.addEventListener('touchend', function() {
    track.classList.remove('no-transition');
    if (swiping) { if (Math.abs(dx) > 50) goTo(dx < 0 ? idx + 1 : idx - 1); else goTo(idx); }
    swiping = false;
  });

  // mouse drag
  var mDown = false, mStartX = 0, mDx = 0;
  track.addEventListener('mousedown', function(e) { mDown = true; mStartX = e.clientX; mDx = 0; track.classList.add('no-transition'); e.preventDefault(); });
  document.addEventListener('mousemove', function(e) { if (!mDown) return; mDx = e.clientX - mStartX; if (Math.abs(mDx) > 10) stopAuto(); track.style.transform = 'translateX(' + (-idx * 100 + mDx / track.parentElement.offsetWidth * 100) + '%)'; });
  document.addEventListener('mouseup', function() { if (!mDown) return; mDown = false; track.classList.remove('no-transition'); if (Math.abs(mDx) > 50) goTo(mDx < 0 ? idx + 1 : idx - 1); else goTo(idx); });

  document.addEventListener('touchstart', onUserActivity, { passive: true });
  document.addEventListener('click', onUserActivity);
  document.addEventListener('scroll', onUserActivity, { passive: true });
  document.addEventListener('keydown', onUserActivity);

  showCarousel();
  startAuto();
})();
</script>
