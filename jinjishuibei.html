* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060e1a;
  --bg-card: #0b1829;
  --bg-card-hover: #0f2040;
  --bg-header: #070f1e;
  --border: rgba(34,197,94,0.15);
  --border-hover: rgba(34,197,94,0.4);
  --green: #22c55e;
  --green-light: #4ade80;
  --green-dim: rgba(34,197,94,0.12);
  --text: #e8f0ff;
  --text-secondary: #7a9cc4;
  --text-dim: #3a5278;
  --white: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.6);
  --shadow-g: 0 4px 30px rgba(34,197,94,0.15);
  --radius: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.header { background: var(--bg-header); padding: 0 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
.header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 18px 0 0; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), #16a34a); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 12px rgba(34,197,94,0.3); }
.header-title { font-size: 18px; font-weight: 700; color: var(--green); letter-spacing: 2px; }
.header-subtitle { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; margin-top: 1px; }
.header-right { font-size: 12px; color: var(--text-dim); }

.carousel { max-width: 1100px; margin: 16px auto 0; padding: 0 20px; position: relative; overflow: hidden; border-radius: var(--radius); height: 140px; }
.carousel-track { display: flex; transition: transform 0.4s ease; height: 100%; }
.carousel-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0b1829 0%, #0a2418 50%, #0b1829 100%); border-radius: var(--radius); flex-direction: column; gap: 6px; }
.carousel-slide-icon { font-size: 32px; }
.carousel-slide-title { font-size: 20px; font-weight: 700; color: var(--green-light); }
.carousel-slide-sub { font-size: 12px; color: var(--text-secondary); }
.carousel-dot { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
.carousel-dot span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); cursor: pointer; transition: all 0.3s; }
.carousel-dot span.active { background: var(--green); width: 20px; border-radius: 3px; }

.search-bar { max-width: 1100px; margin: 16px auto 0; padding: 0 20px; }
.search-bar input { width: 100%; padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 15px; outline: none; transition: border-color 0.3s; }
.search-bar input:focus { border-color: var(--green); }
.search-bar input::placeholder { color: var(--text-dim); }

.zone-tabs { max-width: 1100px; margin: 14px auto 0; padding: 0 20px; display: flex; gap: 8px; flex-wrap: wrap; }
.zone-tab { padding: 8px 16px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.zone-tab:hover { border-color: var(--green); color: var(--green-light); }
.zone-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green-light); }

.floor-tabs { max-width: 1100px; margin: 10px auto 0; padding: 0 20px; display: flex; gap: 6px; }
.floor-tab { padding: 7px 14px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.floor-tab:hover { border-color: var(--green); color: var(--green-light); }
.floor-tab.active { background: var(--green); border-color: var(--green); color: var(--white); }

#content { max-width: 1100px; margin: 16px auto 40px; padding: 0 20px; }

.stats-bar { display: flex; gap: 12px; margin-bottom: 16px; }
.stat-item { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; color: var(--green-light); }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

.vip-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.vip-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.vip-header-icon { font-size: 28px; }
.vip-header-text { font-size: 16px; font-weight: 700; color: var(--green-light); }
.vip-header-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
.vip-header-line { flex: 1; height: 1px; background: var(--border); }
.vip-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.vip-card { background: var(--bg); border-radius: 10px; padding: 14px; border: 1px solid var(--border); display: flex; flex-direction: column; }
.vip-tier { font-size: 15px; font-weight: 700; color: var(--green-light); text-align: center; margin-bottom: 8px; }
.vip-divider { height: 1px; background: var(--border); margin-bottom: 8px; }
.vip-benefit { list-style: none; font-size: 11px; color: var(--text-secondary); flex: 1; }
.vip-benefit li { padding: 2px 0; }
.vip-cond { margin-top: 10px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 8px; }
.vip-cond-row { display: flex; justify-content: space-between; padding: 2px 0; }
.vip-tag-forever { color: var(--green); }

.brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.brand-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; transition: all 0.2s; }
.brand-card:hover { border-color: var(--green); background: var(--bg-card-hover); box-shadow: var(--shadow-g); transform: translateY(-2px); }
.brand-card.highlight { border-color: var(--green); }
.brand-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge-reno { font-size: 9px; background: #ff6b6b; color: white; padding: 1px 5px; border-radius: 3px; font-weight: 400; }
.brand-code { font-size: 11px; color: var(--green); margin-bottom: 6px; font-family: monospace; }
.brand-location { font-size: 11px; color: var(--text-secondary); }
.brand-tags { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

.modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 440px; box-shadow: var(--shadow); }
.modal-name { font-size: 22px; font-weight: 700; color: var(--green-light); margin-bottom: 8px; }
.modal-code { font-size: 12px; color: var(--green); font-family: monospace; margin-bottom: 14px; }
.modal-row { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.modal-tag { background: var(--green-dim); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.modal-tag-label { color: var(--text-dim); }
.modal-tag-val { color: var(--text); }
.modal-subloc { background: rgba(34,197,94,0.06); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.modal-divider { height: 1px; background: var(--border); margin: 14px 0; }
.modal-section-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; }
.modal-brands { font-size: 14px; color: var(--text); }
.modal-tags-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.modal-tag-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); }

@media (max-width: 600px) {

  .vip-cards { grid-template-columns: repeat(2, 1fr); }
  .modal-row { flex-direction: column; gap: 8px; }
}
</style>

var searchQuery='';
var currentZone='';
var currentFloor='';
var slideIdx=0;
var slideTimer;

function goSlide(n){
  slideIdx=n;
  document.getElementById('carousel-track').style.transform='translateX(-'+(n*100)+'%)';
  document.querySelectorAll('.carousel-dot span').forEach(function(s,i){s.classList.toggle('active',i===n);});
}
function nextSlide(){goSlide((slideIdx+1)%3);}
function startCarousel(){
  slideTimer=setInterval(nextSlide,4000);
  var c=document.querySelector('.carousel');
  c.addEventListener('mouseenter',function(){clearInterval(slideTimer);});
  c.addEventListener('mouseleave',function(){clearInterval(slideTimer);slideTimer=setInterval(nextSlide,4000);});
}
startCarousel();

function openModal(shop,floorName,zoneName){
  document.getElementById('modalName').textContent=shop.name;
  document.getElementById('modalCode').textContent=shop.code;
  document.getElementById('modalFloor').textContent=floorName;
  document.getElementById('modalZone').textContent=zoneName;
  document.getElementById('modalBrands').textContent=(shop.brands||[]).join(' / ');
  var tagsEl=document.getElementById('modalTags');
  var tagText=shop.tags||'';
  if(tagText){
    tagsEl.innerHTML=tagText.split(/[s\/，,]+/).filter(Boolean).map(function(t){return'<span class="modal-tag-chip">'+t+'</span>';}).join('');
  }else{tagsEl.innerHTML='';}
  var sublocEl=document.getElementById('modalSubloc');
  if(shop.subloc){sublocEl.textContent='📍 '+shop.subloc;sublocEl.style.display='';}else{sublocEl.style.display='none';}
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}

function getAllZones(){
  var zones=[];
  Object.values(DATA).forEach(function(f){
    Object.keys(f.categories||{}).forEach(function(z){if(!zones.includes(z))zones.push(z);});
  });
  return zones;
}

function initZoneTabs(zones){
  var container=document.getElementById('zone-tabs');
  var html='';
  zones.forEach(function(z,i){html+='<div class="zone-tab'+(i===0?' active':'')+'" data-zone="'+z+'">'+z+'</div>';});
  container.innerHTML=html;
  container.querySelectorAll('.zone-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      container.querySelectorAll('.zone-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      currentZone=tab.dataset.zone;
      initFloorTabs();
      render();
    });
  });
}

function initFloorTabs(){
  var container=document.getElementById('floor-tabs');
  var floors=Object.keys(DATA);
  var first='';
  var html='';
  floors.forEach(function(f){
    var floor=DATA[f];
    var hasZone=(floor.categories[currentZone]&&floor.categories[currentZone].length>0);
    if(!first&&hasZone)first=f;
    html+='<div class="floor-tab'+(f===first?' active':'')+'" data-floor="'+f+'">'+floor.floorName+'</div>';
  });
  container.innerHTML=html;
  container.querySelectorAll('.floor-tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      container.querySelectorAll('.floor-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      currentFloor=tab.dataset.floor;
      render();
    });
  });
  if(!currentFloor&&first){
    currentFloor=first;
    container.querySelectorAll('.floor-tab').forEach(function(tab){tab.classList.toggle('active',tab.dataset.floor===first);});
  }
}

function render(){
  var content=document.getElementById('content');
  if(!currentZone||!currentFloor){content.innerHTML='';return;}
  var floor=DATA[currentFloor];
  if(!floor)return;
  var shops=floor.categories[currentZone]||[];
  var q=searchQuery.trim().toLowerCase();
  var filtered=q?shops.filter(function(s){
    return s.name.toLowerCase().includes(q)||s.code.toLowerCase().includes(q)||(s.brands||[]).some(function(b){return b.toLowerCase().includes(q);})||(s.tags&&s.tags.toLowerCase().includes(q));
  }):shops;
  var escFloor=(floor.floorName||'').replace(/'/g,"\\'");
  var escZone=(currentZone||'').replace(/'/g,"\\'");
  var html='<div class="stats-bar"><div class="stat-item"><div class="stat-num">'+currentZone+'</div><div class="stat-label">当前区位</div></div><div class="stat-item"><div class="stat-num">'+floor.floorName+'</div><div class="stat-label">当前楼层</div></div><div class="stat-item"><div class="stat-num">'+filtered.length+'</div><div class="stat-label">品牌数量</div></div></div>';

  // VIP section
  html+='<div class="vip-section"><div class="vip-header"><div class="vip-header-icon">👑</div><div><div class="vip-header-text">会员权益</div><div class="vip-header-sub">VIP MEMBERSHIP BENEFITS</div></div><div class="vip-header-line"></div></div><div class="vip-cards">';

  var vipCards=[
    {tier:'V 卡',items:['消费积分','积分当钱花','积分兑礼'],cond:[['升级条件','扫码注册'],['有效期','永久有效']],forever:true},
    {tier:'银 卡',items:['V卡全部权益','双倍积分日','免费停车2h','积分兑礼','免费礼品包装×1'],cond:[['升级条件','日消费满¥1k / 年消费满¥3k'],['保级条件','年消费满¥3k'],['有效期','1年']]},
    {tier:'金 卡',items:['银卡全部权益','免费停车2h','高端活动邀请','生日礼遇（倒推1年满1w）','积分兑礼','免费礼品包装×3'],cond:[['升级条件','日消费满¥1w / 年消费满¥3w'],['保级条件','年消费满¥3w'],['有效期','1年']]},
    {tier:'钻石卡',items:['金卡全部权益','免费停车（单店满8w）','一对一定制服务','LED大屏使用','生日礼遇（倒推1年满3w）','积分兑礼','免费礼品包装×5'],cond:[['升级条件','日消费满¥5w / 年消费满¥10w'],['保级条件','年消费满¥8w'],['有效期','1年']]}
  ];

  vipCards.forEach(function(v){
    html+='<div class="vip-card"><div class="vip-tier">'+v.tier+'</div><div class="vip-divider"></div><ul class="vip-benefit">';
    v.items.forEach(function(item){html+='<li>'+item+'</li>';});
    html+='</ul><div class="vip-cond">';
    v.cond.forEach(function(row){
      var forever=v.forever&&row[1]==='永久有效'?'<span class="vip-tag-forever">'+row[1]+'</span>':row[1];
      html+='<div class="vip-cond-row"><span>'+row[0]+'</span><span>'+forever+'</span></div>';
    });
    html+='</div></div>';
  });

  html+='</div></div>';

  if(filtered.length===0){
    html+='<div class="empty-state"><div class="icon">🔍</div><p>'+(q?'未找到匹配的品牌':'该区位暂无品牌信息')+'</p></div>';
  }else{
    html+='<div class="brand-grid">';
    filtered.forEach(function(shop){
      var hi=q&&shop.name.toLowerCase().includes(q);
      var renov=shop.renovating;
      var tags=shop.tags||'';
      var subloc=shop.subloc?' · '+shop.subloc:'';
      var sj=JSON.stringify(shop).replace(/"/g,'&quot;');
      html+='<div class="brand-card'+(hi?' highlight':'')+'" onclick="openModal('+sj+',\''+escFloor+'\',\''+escZone+'\')">'+
        '<div class="brand-name">'+shop.name+(renov?'<span class="badge-reno">已撤场</span>':'')+'</div>'+
        '<div class="brand-code">'+shop.code+'</div>'+
        '<div class="brand-location">📍 '+(shop.location||'')+'</div>'+
        (tags?'<div class="brand-tags">'+tags+subloc+'</div>':'')+'</div>';
    });
    html+='</div>';
  }
  content.innerHTML=html;
}

(function(){
  var zones=getAllZones();
  currentZone=zones[0]||'';
  initZoneTabs(zones);
  initFloorTabs();
  render();
  var si=document.getElementById('search-input');
  if(si){var t;si.addEventListener('input',function(){clearTimeout(t);t=setTimeout(function(){searchQuery=si.value;render();},200);});}
})();

</script>
