let currentZone = '';
let currentFloor = '';
let searchQuery = '';

// Collect all zones
function getAllZones() {
  const zones = new Set();
  Object.values(DATA).forEach(floor => {
    Object.keys(floor.categories).forEach(z => zones.add(z));
  });
  return Array.from(zones);
}

// Get floors for a given zone
function getFloorsForZone(zone) {
  const floors = [];
  Object.entries(DATA).forEach(([floorKey, floor]) => {
    if (floor.categories[zone]) {
      floors.push(floorKey);
    }
  });
  return floors;
}

function initZoneTabs() {
  const container = document.getElementById('zoneTabs');
  container.innerHTML = '';
  const zones = getAllZones();
  currentZone = zones[0] || '';
  zones.forEach(zone => {
    const tab = document.createElement('div');
    tab.className = 'zone-tab' + (zone === currentZone ? ' active' : '');
    tab.textContent = zone;
    tab.onclick = () => switchZone(zone);
    container.appendChild(tab);
  });
}

function initFloorTabs() {
  const container = document.getElementById('floorTabs');
  container.innerHTML = '';
  if (!currentZone) return;
  const floors = getFloorsForZone(currentZone);
  firstFloor = floors[0] || '';
  floors.forEach(floor => {
    const tab = document.createElement('div');
    tab.className = 'floor-tab' + (floor === currentFloor ? ' active' : '');
    tab.textContent = DATA[floor].floorName;
    tab.onclick = () => switchFloor(floor);
    container.appendChild(tab);
  });
}

function switchZone(zone) {
  currentZone = zone;
  document.querySelectorAll('.zone-tab').forEach((t, i) => {
    t.classList.toggle('active', getAllZones()[i] === zone);
  });
  initFloorTabs();
  render();
}

function switchFloor(floor) {
  currentFloor = floor;
  const floors = getFloorsForZone(currentZone);
  document.querySelectorAll('.floor-tab').forEach((t, i) => {
    t.classList.toggle('active', floors[i] === floor);
  });
  render();
}

/* Carousel - same idle behavior */
(function() {
  const slides = ['activity1.png', 'activity2.jpg', 'activity3.jpg'];
  const total = slides.length;
  let idx = 0, timer = null, idleTimer = null;
  const INTERVAL = 4000, IDLE_DELAY = 10000;

  const overlay = document.createElement('div');
  overlay.className = 'carousel-overlay';
  overlay.id = 'carouselOverlay';
  let dotsHTML = '';
  for (let i = 0; i < total; i++) dotsHTML += '<div class="carousel-dot' + (i===0?' active':'') + '" data-i="' + i + '"></div>';
  overlay.innerHTML =
    '<button class="carousel-close" id="carouselClose">✕</button>' +
    '<div class="carousel-track-wrap">' +
      '<div class="carousel-track" id="carouselTrack">' +
        slides.map(function(s) { return '<div class="carousel-slide"><img src="' + s + '" draggable="false"></div>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="carousel-dots" id="carouselDots">' + dotsHTML + '</div>';
  document.body.appendChild(overlay);

  var track = document.getElementById('carouselTrack');
  var dots = document.getElementById('carouselDots').children;
  var closeBtn = document.getElementById('carouselClose');

  function goTo(i) {
    if (i < 0) i = total - 1;
    if (i >= total) i = 0;
    idx = i;
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    for (var d = 0; d < dots.length; d++) dots[d].classList.toggle('active', d === idx);
  }

  function startAuto() { stopAuto(); timer = setInterval(function() { goTo(idx + 1); }, INTERVAL); }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }

  function startIdleTimer() { clearIdleTimer(); idleTimer = setTimeout(function() { showCarousel(); goTo(0); startAuto(); }, IDLE_DELAY); }
  function clearIdleTimer() { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; } }

  function onUserActivity() {
    if (overlay.classList.contains('hidden')) {
      clearIdleTimer();
      startIdleTimer();
    }
  }

  function showCarousel() { overlay.classList.remove('hidden'); }
  function hideCarousel() { overlay.classList.add('hidden'); stopAuto(); startIdleTimer(); }

  closeBtn.addEventListener('click', function() { hideCarousel(); });
  for (var d = 0; d < dots.length; d++) {
    dots[d].addEventListener('click', (function(i) { return function() { stopAuto(); goTo(i); }; })(d));
  }

  // touch swipe
  var startX = 0, startY = 0, swiping = false, dx = 0;
  track.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    swiping = false; dx = 0; touchMoved = false;
    track.classList.add('no-transition');
  }, { passive: true });
  var touchMoved = false;
  track.addEventListener('touchmove', function(e) {
    touchMoved = true;
    var cx = e.touches[0].clientX, cy = e.touches[0].clientY;
    dx = cx - startX;
    if (Math.abs(cy - startY) > Math.abs(dx)) return;
    if (Math.abs(dx) > 10 && !swiping) { swiping = true; stopAuto(); }
    if (swiping) track.style.transform = 'translateX(' + (-idx * 100 + dx / track.parentElement.offsetWidth * 100) + '%)';
  }, { passive: true });
  track.addEventListener('touchend', function() {
    track.classList.remove('no-transition');
    if (swiping) { if (Math.abs(dx) > 50) goTo(dx < 0 ? idx + 1 : idx - 1); else goTo(idx); }
    swiping = false;
  });

  // mouse drag
  var mDown = false, mStartX = 0, mDx = 0;
  track.addEventListener('mousedown', function(e) { mDown = true; mStartX = e.clientX; mDx = 0; track.classList.add('no-transition'); e.preventDefault(); });
  document.addEventListener('mousemove', function(e) { if (!mDown) return; mDx = e.clientX - mStartX; if (Math.abs(mDx) > 10) stopAuto(); track.style.transform = 'translateX(' + (-idx * 100 + mDx / track.parentElement.offsetWidth * 100) + '%)'; });
  document.addEventListener('mouseup', function() { if (!mDown) return; mDown = false; track.classList.remove('no-transition'); if (Math.abs(mDx) > 50) goTo(mDx < 0 ? idx + 1 : idx - 1); else goTo(idx); });

  document.addEventListener('touchstart', onUserActivity, { passive: true });
  document.addEventListener('click', onUserActivity);
  document.addEventListener('scroll', onUserActivity, { passive: true });
  document.addEventListener('keydown', onUserActivity);

  showCarousel();
  startAuto();
})();
</script>

let currentZone = '';
let currentFloor = '';
let searchQuery = '';

// Collect all zones
function getAllZones() {
  const zones = new Set();
  Object.values(DATA).forEach(floor => {
    Object.keys(floor.categories).forEach(z => zones.add(z));
  });
  return Array.from(zones);
}

// Get floors for a given zone
function getFloorsForZone(zone) {
  const floors = [];
  Object.entries(DATA).forEach(([floorKey, floor]) => {
    if (floor.categories[zone]) {
      floors.push(floorKey);
    }
  });
  return floors;
}

function initZoneTabs() {
  const container = document.getElementById('zoneTabs');
  container.innerHTML = '';
  const zones = getAllZones();
  currentZone = zones[0] || '';
  zones.forEach(zone => {
    const tab = document.createElement('div');
    tab.className = 'zone-tab' + (zone === currentZone ? ' active' : '');
    tab.textContent = zone;
    tab.onclick = () => switchZone(zone);
    container.appendChild(tab);
  });
}

function initFloorTabs() {
  const container = document.getElementById('floorTabs');
  container.innerHTML = '';
  if (!currentZone) return;
  const floors = getFloorsForZone(currentZone);
  firstFloor = floors[0] || '';
  floors.forEach(floor => {
    const tab = document.createElement('div');
    tab.className = 'floor-tab' + (floor === currentFloor ? ' active' : '');
    tab.textContent = DATA[floor].floorName;
    tab.onclick = () => switchFloor(floor);
    container.appendChild(tab);
  });
}

function switchZone(zone) {
  currentZone = zone;
  document.querySelectorAll('.zone-tab').forEach((t, i) => {
    t.classList.toggle('active', getAllZones()[i] === zone);
  });
  initFloorTabs();
  render();
}

function switchFloor(floor) {
  currentFloor = floor;
  const floors = getFloorsForZone(currentZone);
  document.querySelectorAll('.floor-tab').forEach((t, i) => {
    t.classList.toggle('active', floors[i] === floor);
  });
  render();
}

/* Carousel - same idle behavior */
(function() {
  const slides = ['activity1.png', 'activity2.jpg', 'activity3.jpg'];
  const total = slides.length;
  let idx = 0, timer = null, idleTimer = null;
  const INTERVAL = 4000, IDLE_DELAY = 10000;

  const overlay = document.createElement('div');
  overlay.className = 'carousel-overlay';
  overlay.id = 'carouselOverlay';
  let dotsHTML = '';
  for (let i = 0; i < total; i++) dotsHTML += '<div class="carousel-dot' + (i===0?' active':'') + '" data-i="' + i + '"></div>';
  overlay.innerHTML =
    '<button class="carousel-close" id="carouselClose">✕</button>' +
    '<div class="carousel-track-wrap">' +
      '<div class="carousel-track" id="carouselTrack">' +
        slides.map(function(s) { return '<div class="carousel-slide"><img src="' + s + '" draggable="false"></div>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="carousel-dots" id="carouselDots">' + dotsHTML + '</div>';
  document.body.appendChild(overlay);

  var track = document.getElementById('carouselTrack');
  var dots = document.getElementById('carouselDots').children;
  var closeBtn = document.getElementById('carouselClose');

  function goTo(i) {
    if (i < 0) i = total - 1;
    if (i >= total) i = 0;
    idx = i;
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    for (var d = 0; d < dots.length; d++) dots[d].classList.toggle('active', d === idx);
  }

  function startAuto() { stopAuto(); timer = setInterval(function() { goTo(idx + 1); }, INTERVAL); }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }

  function startIdleTimer() { clearIdleTimer(); idleTimer = setTimeout(function() { showCarousel(); goTo(0); startAuto(); }, IDLE_DELAY); }
  function clearIdleTimer() { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; } }

  function onUserActivity() {
    if (overlay.classList.contains('hidden')) {
      clearIdleTimer();
      startIdleTimer();
    }
  }

  function showCarousel() { overlay.classList.remove('hidden'); }
  function hideCarousel() { overlay.classList.add('hidden'); stopAuto(); startIdleTimer(); }

  closeBtn.addEventListener('click', function() { hideCarousel(); });
  for (var d = 0; d < dots.length; d++) {
    dots[d].addEventListener('click', (function(i) { return function() { stopAuto(); goTo(i); }; })(d));
  }

  // touch swipe
  var startX = 0, startY = 0, swiping = false, dx = 0;
  track.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    swiping = false; dx = 0; touchMoved = false;
    track.classList.add('no-transition');
  }, { passive: true });
  var touchMoved = false;
  track.addEventListener('touchmove', function(e) {
    touchMoved = true;
    var cx = e.touches[0].clientX, cy = e.touches[0].clientY;
    dx = cx - startX;
    if (Math.abs(cy - startY) > Math.abs(dx)) return;
    if (Math.abs(dx) > 10 && !swiping) { swiping = true; stopAuto(); }
    if (swiping) track.style.transform = 'translateX(' + (-idx * 100 + dx / track.parentElement.offsetWidth * 100) + '%)';
  }, { passive: true });
  track.addEventListener('touchend', function() {
    track.classList.remove('no-transition');
    if (swiping) { if (Math.abs(dx) > 50) goTo(dx < 0 ? idx + 1 : idx - 1); else goTo(idx); }
    swiping = false;
  });

  // mouse drag
  var mDown = false, mStartX = 0, mDx = 0;
  track.addEventListener('mousedown', function(e) { mDown = true; mStartX = e.clientX; mDx = 0; track.classList.add('no-transition'); e.preventDefault(); });
  document.addEventListener('mousemove', function(e) { if (!mDown) return; mDx = e.clientX - mStartX; if (Math.abs(mDx) > 10) stopAuto(); track.style.transform = 'translateX(' + (-idx * 100 + mDx / track.parentElement.offsetWidth * 100) + '%)'; });
  document.addEventListener('mouseup', function() { if (!mDown) return; mDown = false; track.classList.remove('no-transition'); if (Math.abs(mDx) > 50) goTo(mDx < 0 ? idx + 1 : idx - 1); else goTo(idx); });

  document.addEventListener('touchstart', onUserActivity, { passive: true });
  document.addEventListener('click', onUserActivity);
  document.addEventListener('scroll', onUserActivity, { passive: true });
  document.addEventListener('keydown', onUserActivity);

  showCarousel();
  startAuto();
})();


<script>

let searchQuery = '';
let currentZone = '';
let currentFloor = '';

function openModal(shop, floorName, zoneName) {
  document.getElementById('modalName').textContent = shop.name;
  document.getElementById('modalCode').textContent = shop.code;
  document.getElementById('modalFloor').textContent = floorName;
  document.getElementById('modalZone').textContent = zoneName;
  document.getElementById('modalBrands').textContent = shop.brands.join(' / ');
  document.getElementById('modalTags').textContent = shop.tags || '';
  document.getElementById('modalLocation').textContent = '📍 ' + shop.location;
  document.getElementById('modalOverlay').classList.add('active');
  const subloc = document.getElementById('modalSubloc');
  if (shop.subloc) { subloc.textContent = shop.subloc; subloc.style.display = ''; }
  else { subloc.style.display = 'none'; }
  window._currentShop = shop;
  window._currentFloorName = floorName;
  window._currentZone = zoneName;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

function getAllZones() {
  const zones = [];
  Object.values(DATA).forEach(floor => {
    Object.keys(floor.categories || {}).forEach(z => { if (!zones.includes(z)) zones.push(z); });
  });
  return zones;
}

function initZoneTabs(zones) {
  const container = document.getElementById('zone-tabs');
  if (!container) return;
  let html = '';
  zones.forEach((z, i) => {
    html += '<div class="zone-tab' + (i === 0 ? ' active' : '') + '" data-zone="' + z + '">' + z + '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.zone-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.zone-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentZone = tab.dataset.zone;
      currentFloor = initFloorTabs(zones);
      render();
    });
  });
}

function initFloorTabs(zones) {
  const container = document.getElementById('floor-tabs');
  if (!container) return '';
  const floors = Object.keys(DATA);
  let firstFloor = '';
  let html = '';
  floors.forEach(f => {
    const floor = DATA[f];
    const hasZone = zones.some(z => floor.categories[z] && Array.isArray(floor.categories[z]) && floor.categories[z].length > 0);
    if (!firstFloor && hasZone) firstFloor = f;
    html += '<div class="floor-tab' + (f === firstFloor ? ' active' : '') + '" data-floor="' + f + '">' + floor.floorName + '</div>';
  });
  container.innerHTML = html;
  container.querySelectorAll('.floor-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.floor-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFloor = tab.dataset.floor;
      render();
    });
  });
  return firstFloor;
}

function render() {
  const content = document.getElementById('content');
  if (!content) return;
  if (!currentZone || !currentFloor) { content.innerHTML = ''; return; }

  const floor = DATA[currentFloor];
  if (!floor) return;
  const shops = floor.categories[currentZone] || [];

  const q = searchQuery.trim().toLowerCase();
  const filtered = q
    ? shops.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.code.toLowerCase().includes(q) ||
        s.location.toLowerCase().includes(q) ||
        (s.brands || []).some(b => b.toLowerCase().includes(q)) ||
        (s.tags && s.tags.toLowerCase().includes(q))
      )
    : shops;

  const escFloor = (floor.floorName || '').replace(/'/g, "\'");
  const escZone = (currentZone || '').replace(/'/g, "\'");

  let html = `
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-num">${currentZone}</div>
      <div class="stat-label">当前区位</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">${floor.floorName}</div>
      <div class="stat-label">当前楼层</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">${filtered.length}</div>
      <div class="stat-label">品牌数量</div>
    </div>
  </div>

  <div class="vip-section">
    <div class="vip-header">
      <div class="vip-header-icon">👑</div>
      <div>
        <div class="vip-header-text">会员权益</div>
        <div class="vip-header-sub">VIP MEMBERSHIP BENEFITS</div>
      </div>
      <div class="vip-header-line"></div>
    </div>
    <div class="vip-cards">
      <div class="vip-card v-card">
        <div class="vip-tier">V 卡</div>
        <div class="vip-divider"></div>
        <ul class="vip-benefit"><li>消费积分</li><li>积分当钱花</li><li>积分兑礼</li></ul>
        <div class="vip-cond"><div class="vip-cond-row"><span>升级条件</span><span>扫码注册</span></div><div class="vip-cond-row"><span>有效期</span><span class="vip-tag-forever">永久有效</span></div></div>
      </div>
      <div class="vip-card s-card">
        <div class="vip-tier">银 卡</div>
        <div class="vip-divider"></div>
        <ul class="vip-benefit"><li>V卡全部权益</li><li>双倍积分日</li><li>免费停车2h</li><li>积分兑礼</li><li>免费礼品包装×1</li></ul>
        <div class="vip-cond"><div class="vip-cond-row"><span>升级条件</span><span>日消费满¥1k / 年消费满¥3k</span></div><div class="vip-cond-row"><span>保级条件</span><span>年消费满¥3k</span></div><div class="vip-cond-row"><span>有效期</span><span>1年</span></div></div>
      </div>
      <div class="vip-card g-card">
        <div class="vip-tier">金 卡</div>
        <div class="vip-divider"></div>
        <ul class="vip-benefit"><li>银卡全部权益</li><li>免费停车2h</li><li>高端活动邀请</li><li>生日礼遇（倒推1年满1w）</li><li>积分兑礼</li><li>免费礼品包装×3</li></ul>
        <div class="vip-cond"><div class="vip-cond-row"><span>升级条件</span><span>日消费满¥1w / 年消费满¥3w</span></div><div class="vip-cond-row"><span>保级条件</span><span>年消费满¥3w</span></div><div class="vip-cond-row"><span>有效期</span><span>1年</span></div></div>
      </div>
      <div class="vip-card d-card">
        <div class="vip-tier">钻石卡</div>
        <div class="vip-divider"></div>
        <ul class="vip-benefit"><li>金卡全部权益</li><li>免费停车（单店消费满8w）</li><li>高端活动邀请</li><li>一对一定制服务</li><li>LED大屏使用</li><li>生日礼遇（倒推1年满3w）</li><li>积分兑礼</li><li>免费礼品包装×5</li></ul>
        <div class="vip-cond"><div class="vip-cond-row"><span>升级条件</span><span>日消费满¥5w / 年消费满¥10w</span></div><div class="vip-cond-row"><span>保级条件</span><span>年消费满¥8w</span></div><div class="vip-cond-row"><span>有效期</span><span>1年</span></div></div>
      </div>
    </div>
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">🔍</div><p>${q ? '未找到匹配的品牌' : '该区位暂无品牌信息'}</p></div>`;
  } else {
    html += `<div class="brand-grid">`;
    filtered.forEach(shop => {
      const hi = q && shop.name.toLowerCase().includes(q);
      const renov = shop.renovating;
      const tags = shop.tags || '';
      const subloc = shop.subloc ? ' · ' + shop.subloc : '';
      const shopJson = JSON.stringify(shop).replace(/"/g, '&quot;');
      html += `<div class="brand-card${hi ? ' highlight' : ''}" onclick="openModal(${shopJson}, '${escFloor}', '${escZone}')">
        <div class="brand-name">${shop.name}${renov ? '<span class="badge-reno">已撤场</span>' : ''}</div>
        <div class="brand-code">${shop.code}</div>
        <div class="brand-location">📍 ${shop.location}</div>
        ${tags ? '<div class="brand-tags">' + tags + subloc + '</div>' : ''}
      </div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

// IIFE - initialize
(function() {
  const zones = getAllZones();
  currentZone = zones[0] || '';
  initZoneTabs(zones);
  currentFloor = initFloorTabs(zones);
  render();

  // Search
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    let timer;
    searchInput.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        searchQuery = searchInput.value;
        render();
      }, 200);
    });
  }
})();

</script>
